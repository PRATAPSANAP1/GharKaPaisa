<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | OIT_Stack</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css?v=light-theme">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, rgba(0, 191, 255, 0.05), transparent),
                radial-gradient(circle at bottom left, rgba(10, 25, 47, 0.03), transparent);
            padding: 2rem;
        }

        .auth-card {
            background: var(--bg-white);
            padding: 3rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border);
            animation: modalSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header .logo-icon {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .auth-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 3rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
            background: #f8fafc;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 191, 255, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 1rem;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 1rem;
            margin-top: 1rem;
            margin-bottom: 1.5rem;
        }

        .social-auth {
            text-align: center;
        }

        .social-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .social-divider::before,
        .social-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .social-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: white;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .social-btn:hover {
            background: #f8fafc;
            border-color: var(--text-muted);
        }

        .auth-footer {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent);
            font-weight: 700;
            text-decoration: none;
        }

        @keyframes modalSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo-icon"><i class="fa-solid fa-user-plus"></i></div>
            <h1>Create Account</h1>
            <p>Join OIT_Stack and start your journey</p>
        </div>

        <form action="#">
            <div class="form-group">
                <label for="name">Full Name</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" id="name" placeholder=" " required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" placeholder=" " required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder=" " required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary auth-btn"
                onclick="event.preventDefault(); window.location.href='index.html'">Sign Up</button>
        </form>

        <div class="social-auth">
            <div class="social-divider">Or register with</div>
            <div class="social-btns">
                <button class="social-btn"><i class="fa-brands fa-google" style="color: #DB4437;"></i> Google</button>
                <button class="social-btn"><i class="fa-brands fa-apple"></i> Apple</button>
            </div>
        </div>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Sign in here</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
