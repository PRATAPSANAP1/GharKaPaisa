<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Create/Edit Question</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="api.js"></script>
</head>
<body class="bg-slate-50 dark:bg-[#0a0f1e] text-slate-900 dark:text-white font-sans overflow-hidden">
    
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-slate-900 dark:bg-[#0d1117] border-r border-slate-800/60 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col">
            <div class="h-16 flex items-center justify-between px-5 border-b border-slate-800/60">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                        <i data-lucide="shield-check" class="w-4 h-4 text-white"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-white text-sm leading-none">OIT_STACK</h1>
                        <p class="text-[10px] text-slate-500 font-medium mt-0.5">Admin Portal</p>
                    </div>
                </div>
            </div>
            
            <nav class="flex-1 py-3 px-3 overflow-y-auto space-y-0.5">
                <a href="admin-dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="layout-dashboard" class="w-4 h-4 shrink-0"></i> Dashboard
                </a>
                <a href="admin-students.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="users" class="w-4 h-4 shrink-0"></i> Students
                </a>
                <a href="admin-questions.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium bg-indigo-500/15 text-indigo-400 border border-indigo-500/20">
                    <i data-lucide="database" class="w-4 h-4 shrink-0 text-indigo-400"></i> Question Pool
                </a>
                <a href="admin-tests.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="file-text" class="w-4 h-4 shrink-0"></i> Tests
                </a>
                <a href="admin-coding.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="code" class="w-4 h-4 shrink-0"></i> Coding Challenges
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0 h-full">
            <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200/80 dark:border-slate-800/60 flex items-center justify-between px-4 lg:px-6 shrink-0 z-20">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800">
                        <i data-lucide="menu" class="w-5 h-5 text-slate-600 dark:text-slate-400"></i>
                    </button>
                    <a href="admin-questions.html" class="inline-flex items-center text-sm font-bold text-slate-500 hover:text-slate-800 dark:hover:text-white transition-colors">
                        <i data-lucide="chevron-left" class="w-4 h-4 mr-1"></i> Back
                    </a>
                </div>
                <div class="flex items-center gap-1.5">
                    <button onclick="toggleTheme()" class="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                        <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 lg:p-6 bg-slate-50/50 dark:bg-[#0a0f1e]/50">
                <div class="max-w-5xl mx-auto flex flex-col gap-6 pb-12">
                    
                    <div>
                        <h1 id="pageTitle" class="text-2xl font-black text-slate-800 dark:text-white">Add MCQ Question</h1>
                    </div>

                    <div id="loader" class="flex justify-center py-12">
                        <div class="animate-spin h-8 w-8 border-4 border-indigo-500 border-t-transparent rounded-full"></div>
                    </div>

                    <div id="formContent" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                        
                        <!-- Form Panel -->
                        <div class="lg:col-span-2 bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-3xl p-6 shadow-sm">
                            <form id="qForm" class="flex flex-col gap-5">
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 mb-1.5">Format</label>
                                        <select id="type" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:outline-none focus:border-indigo-500" onchange="handleTypeChange()">
                                            <option value="mcq">Multiple Choice (MCQ)</option>
                                            <option value="true-false">True / False</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 mb-1.5">Difficulty</label>
                                        <select id="difficulty" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:outline-none focus:border-indigo-500" onchange="updatePreview()">
                                            <option value="easy">Easy</option>
                                            <option value="medium" selected>Medium</option>
                                            <option value="hard">Hard</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 mb-1.5">Category</label>
                                        <select id="category" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:outline-none focus:border-indigo-500">
                                            <option value="">Select Category</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 mb-1.5">Subcategory</label>
                                        <select id="subcategory" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:outline-none focus:border-indigo-500">
                                            <option value="">None</option>
                                        </select>
                                    </div>
                                </div>

                                <div>
                                    <label class="block text-xs font-bold text-slate-500 mb-1.5">Question Text</label>
                                    <textarea id="questionDesc" rows="3" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:outline-none focus:border-indigo-500" placeholder="e.g. Which of the following..." oninput="updatePreview()"></textarea>
                                </div>

                                <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 mb-1.5">Marks</label>
                                        <input type="number" id="marks" value="1" step="0.5" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:outline-none focus:border-indigo-500" oninput="updatePreview()">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 mb-1.5">Penalty</label>
                                        <input type="number" id="negativeMark" value="0" step="0.05" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:outline-none focus:border-indigo-500" oninput="updatePreview()">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 mb-1.5">Time Limit (s)</label>
                                        <input type="number" id="timeLimit" value="60" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:outline-none focus:border-indigo-500">
                                    </div>
                                </div>

                                <!-- Options Editor -->
                                <div class="border-t border-slate-100 dark:border-slate-800 pt-4 mt-2">
                                    <div class="flex justify-between items-center mb-3">
                                        <h4 class="text-xs font-bold text-slate-800 dark:text-white uppercase tracking-wider">Answer Options & Key</h4>
                                        <button type="button" id="addOptionBtn" onclick="addOption()" class="text-xs font-bold text-indigo-500 hover:text-indigo-600 flex items-center gap-1">
                                            <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add Option
                                        </button>
                                    </div>
                                    <div id="optionsContainer" class="flex flex-col gap-3">
                                        <!-- JS options injected here -->
                                    </div>
                                </div>

                                <div>
                                    <label class="block text-xs font-bold text-slate-500 mb-1.5">Explanation (Optional)</label>
                                    <textarea id="explanation" rows="2" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:outline-none focus:border-indigo-500" oninput="updatePreview()"></textarea>
                                </div>

                                <div id="errBox" class="hidden text-rose-500 text-xs font-bold mt-2"></div>

                                <div class="flex justify-end gap-3 mt-2">
                                    <button type="submit" id="saveBtn" class="px-6 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm shadow-md shadow-indigo-500/20 flex items-center gap-2">
                                        <i data-lucide="save" class="w-4 h-4"></i> Save Question
                                    </button>
                                </div>
                            </form>
                        </div>

                        <!-- Preview Panel -->
                        <div>
                            <div class="bg-slate-50/20 border border-slate-200/80 dark:border-slate-800 rounded-3xl p-6 sticky top-24">
                                <div class="flex items-center gap-1.5 text-xs font-bold text-slate-500 dark:text-slate-400 mb-4">
                                    <i data-lucide="eye" class="w-4 h-4"></i> Live Visual Preview
                                </div>

                                <div class="flex flex-col gap-5">
                                    <div id="prevMeta" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                        Marks: 1 | Penalty: -0
                                    </div>

                                    <div id="prevQuestion" class="text-xs font-extrabold text-slate-800 dark:text-white leading-relaxed">
                                        How will the question description appear to students?
                                    </div>

                                    <div id="prevOptions" class="flex flex-col gap-2.5">
                                        <!-- JS -->
                                    </div>

                                    <div id="prevExp" class="hidden p-3 bg-blue-50/20 dark:bg-slate-800/40 border border-blue-50/10 rounded-xl text-[11px] leading-relaxed text-slate-500 dark:text-slate-400">
                                        <p class="font-bold text-blue-500 dark:text-indigo-400 mb-1 flex items-center gap-1.5"><i data-lucide="help-circle" class="w-3.5 h-3.5"></i> Explanation</p>
                                        <span id="prevExpText"></span>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        const urlParams = new URLSearchParams(window.location.search);
        const qId = urlParams.get('id');
        const isEdit = !!qId;
        
        let optionsArr = ['', ''];
        let correctIdx = 0;

        document.addEventListener('DOMContentLoaded', async () => {
            const token = api.getToken();
            if(!token) { window.location.href='login.html'; return; }
            
            if (isEdit) {
                document.getElementById('pageTitle').textContent = 'Modify Question';
            }

            try {
                // Fetch categories
                const catRes = await api.request('/categories');
                const catSelect = document.getElementById('category');
                catRes.data.forEach(c => {
                    catSelect.innerHTML += `<option value="${c._id}">${c.name}</option>`;
                });

                if (isEdit) {
                    const res = await api.request(`/questions/${qId}`);
                    const q = res.data;
                    document.getElementById('type').value = q.type || 'mcq';
                    document.getElementById('difficulty').value = q.difficulty || 'medium';
                    document.getElementById('category').value = q.category?._id || q.category || '';
                    document.getElementById('questionDesc').value = q.question || '';
                    document.getElementById('marks').value = q.marks || 1;
                    document.getElementById('negativeMark').value = q.negativeMark || 0;
                    document.getElementById('timeLimit').value = q.timeLimit || 60;
                    document.getElementById('explanation').value = q.explanation || '';
                    
                    optionsArr = q.options || ['', ''];
                    correctIdx = q.correctAnswer || 0;
                }
                
                renderOptions();
                updatePreview();
                
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('formContent').classList.remove('hidden');

            } catch(e) {
                console.error(e);
                alert("Error loading data");
            }
        });

        function handleTypeChange() {
            const type = document.getElementById('type').value;
            if (type === 'true-false') {
                optionsArr = ['True', 'False'];
                correctIdx = 0;
                document.getElementById('addOptionBtn').classList.add('hidden');
            } else {
                optionsArr = ['', ''];
                document.getElementById('addOptionBtn').classList.remove('hidden');
            }
            renderOptions();
            updatePreview();
        }

        function addOption() {
            if(optionsArr.length >= 6) return alert("Max 6 options allowed");
            optionsArr.push('');
            renderOptions();
            updatePreview();
        }

        function removeOption(idx) {
            if(optionsArr.length <= 2) return alert("Min 2 options required");
            optionsArr.splice(idx, 1);
            if (correctIdx === idx) correctIdx = 0;
            else if (correctIdx > idx) correctIdx--;
            renderOptions();
            updatePreview();
        }

        function setCorrect(idx) {
            correctIdx = idx;
            renderOptions();
            updatePreview();
        }

        function updateOptionText(idx, val) {
            optionsArr[idx] = val;
            updatePreview();
        }

        function renderOptions() {
            const type = document.getElementById('type').value;
            const container = document.getElementById('optionsContainer');
            
            container.innerHTML = optionsArr.map((opt, i) => `
                <div class="flex items-center gap-3">
                    <input type="radio" name="correct" ${correctIdx === i ? 'checked' : ''} onchange="setCorrect(${i})" class="w-5 h-5 text-indigo-600">
                    <input type="text" value="${opt.replace(/"/g, '&quot;')}" oninput="updateOptionText(${i}, this.value)" ${type==='true-false'?'disabled':''} placeholder="Option ${i+1}" class="flex-1 py-2 px-4 rounded-xl text-sm bg-slate-50 dark:bg-slate-800/40 border border-slate-200 dark:border-slate-800 focus:outline-none focus:border-indigo-500">
                    ${type==='mcq' && optionsArr.length > 2 ? `<button type="button" onclick="removeOption(${i})" class="p-2 text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-500/10 rounded-xl"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
                </div>
            `).join('');
            lucide.createIcons();
        }

        function updatePreview() {
            document.getElementById('prevMeta').textContent = `Marks: ${document.getElementById('marks').value} | Penalty: -${document.getElementById('negativeMark').value}`;
            document.getElementById('prevQuestion').textContent = document.getElementById('questionDesc').value || 'How will the question appear?';
            
            document.getElementById('prevOptions').innerHTML = optionsArr.map((opt, i) => `
                <div class="flex items-center justify-between p-3 rounded-xl border text-xs font-bold ${correctIdx === i ? 'border-emerald-500/50 bg-emerald-50/5 text-emerald-600' : 'border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900'}">
                    <span>${opt || `Option ${i+1}`}</span>
                    ${correctIdx === i ? '<span class="text-[9px] uppercase font-black text-emerald-500 tracking-wider">Correct Key</span>' : ''}
                </div>
            `).join('');

            const exp = document.getElementById('explanation').value;
            if(exp) {
                document.getElementById('prevExp').classList.remove('hidden');
                document.getElementById('prevExpText').textContent = exp;
            } else {
                document.getElementById('prevExp').classList.add('hidden');
            }
        }

        document.getElementById('qForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errBox = document.getElementById('errBox');
            errBox.classList.add('hidden');

            const payload = {
                question: document.getElementById('questionDesc').value.trim(),
                type: document.getElementById('type').value,
                options: optionsArr.map(o => o.trim()),
                correctAnswer: correctIdx,
                explanation: document.getElementById('explanation').value.trim(),
                category: document.getElementById('category').value,
                subcategory: document.getElementById('subcategory').value || null,
                difficulty: document.getElementById('difficulty').value,
                marks: parseFloat(document.getElementById('marks').value),
                negativeMark: parseFloat(document.getElementById('negativeMark').value),
                timeLimit: parseInt(document.getElementById('timeLimit').value, 10),
            };

            if(!payload.question) return errBox.textContent="Question required", errBox.classList.remove('hidden');
            if(!payload.category) return errBox.textContent="Category required", errBox.classList.remove('hidden');
            if(payload.options.some(o => !o)) return errBox.textContent="All options must be filled", errBox.classList.remove('hidden');

            try {
                document.getElementById('saveBtn').disabled = true;
                if(isEdit) {
                    await api.request(`/questions/${qId}`, { method: 'PUT', body: JSON.stringify(payload) });
                } else {
                    await api.request(`/questions`, { method: 'POST', body: JSON.stringify(payload) });
                }
                window.location.href = 'admin-questions.html';
            } catch(err) {
                errBox.textContent = err.message;
                errBox.classList.remove('hidden');
                document.getElementById('saveBtn').disabled = false;
            }
        });
    </script>
</body>
</html>
