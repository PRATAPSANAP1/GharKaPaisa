<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIT_STACK - Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="api.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950 px-4 relative overflow-hidden font-sans transition-colors duration-300">
    
    <!-- Navbar (Optional but good for consistency) -->
    <nav class="absolute top-0 w-full h-14 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200/80 dark:border-slate-800/60 flex items-center justify-between px-6 z-50">
        <div class="flex items-center gap-2.5">
            <img src="../image/logo.jpg" alt="OIT_STACK" class="w-10 h-10 object-cover rounded-lg shadow-sm" />
            <span class="font-bold text-slate-900 dark:text-white text-lg">OIT_STACK</span>
        </div>
        <button onclick="toggleTheme()" class="p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-500 dark:text-slate-400">
            <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
            <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
        </button>
    </nav>

    <!-- Decorative Orbs -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-500/10 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-indigo-500/10 rounded-full blur-[100px]"></div>

    <div id="toast" class="hidden fixed top-4 right-4 z-50 p-4 rounded-xl text-sm font-semibold shadow-lg border"></div>

    <div class="w-full max-w-md relative z-10 p-8 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/60 backdrop-blur-xl shadow-xl mt-14">
        
        <div class="flex flex-col items-center justify-center text-center mb-8">
            <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/25 mb-4 animate-bounce">
                <i data-lucide="mail" class="text-white w-6 h-6"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">Forgot Password?</h2>
            <p class="text-sm text-slate-500 dark:text-slate-400 max-w-xs leading-relaxed">
                Enter your student email and we'll send you instructions to reset your password.
            </p>
        </div>

        <div id="successView" class="hidden text-center">
            <div class="p-4 rounded-xl bg-slate-100 dark:bg-slate-800/40 border border-slate-200 dark:border-slate-800 text-slate-700 dark:text-slate-300 text-sm mb-6 leading-relaxed">
                We have sent a password reset link to <span id="sentEmailAddress" class="font-bold text-blue-600 dark:text-blue-400"></span>. Please check your inbox and spam folders.
            </div>
            <a href="login.html" class="inline-flex items-center text-sm font-semibold text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> Back to Login
            </a>
        </div>

        <form id="forgotForm" class="flex flex-col gap-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Student Email</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-3.5 w-5 h-5 text-slate-400"></i>
                    <input id="email" type="email" required placeholder="example@gmail.com" class="w-full pl-12 pr-4 py-3.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800/50 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
                </div>
            </div>

            <button id="submitBtn" type="submit" class="w-full py-3.5 px-6 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-semibold shadow-lg shadow-blue-500/25 flex items-center justify-center gap-2 disabled:opacity-70 transition-transform hover:-translate-y-0.5">
                <span id="btnText" class="flex items-center gap-2">Send Reset Link <i data-lucide="send" class="w-4 h-4"></i></span>
                <div id="btnSpinner" class="hidden animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></div>
            </button>

            <div class="text-center mt-2">
                <a href="login.html" class="inline-flex items-center text-sm font-semibold text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> Back to Login
                </a>
            </div>
        </form>

    </div>

    <script>
        lucide.createIcons();

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `fixed top-4 right-4 z-50 p-4 rounded-xl text-sm font-semibold shadow-lg border ${
                type === 'success' 
                ? 'bg-white dark:bg-slate-900 text-slate-900 dark:text-white border-slate-200 dark:border-slate-800' 
                : 'bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 border-red-200 dark:border-red-800'
            }`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            if (!email) return;

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            document.getElementById('btnText').classList.add('hidden');
            document.getElementById('btnSpinner').classList.remove('hidden');

            try {
                await api.auth.forgotPassword(email);
                
                document.getElementById('forgotForm').classList.add('hidden');
                document.getElementById('successView').classList.remove('hidden');
                document.getElementById('sentEmailAddress').textContent = email;
                showToast('Reset email sent successfully!');

            } catch (err) {
                showToast(err.message || 'Failed to send reset link', 'error');
                btn.disabled = false;
                document.getElementById('btnText').classList.remove('hidden');
                document.getElementById('btnSpinner').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
