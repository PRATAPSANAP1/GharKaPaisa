<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student - Placement Tests</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="api.js"></script>
</head>
<body class="bg-slate-50 dark:bg-[#0a0f1e] text-slate-900 dark:text-white font-sans overflow-hidden">
    
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-slate-900 dark:bg-[#0d1117] border-r border-slate-800/60 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col">
            <div class="h-16 flex items-center justify-between px-5 border-b border-slate-800/60">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/30">
                        <i data-lucide="graduation-cap" class="w-4 h-4 text-white"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-white text-sm leading-none">OIT_STACK</h1>
                        <p class="text-[10px] text-slate-500 font-medium mt-0.5">Student Portal</p>
                    </div>
                </div>
            </div>
            
            <nav class="flex-1 py-3 px-3 overflow-y-auto space-y-0.5">
                <a href="student-dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="layout-dashboard" class="w-4 h-4 shrink-0"></i> Dashboard
                </a>
                <a href="student-tests.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium bg-blue-500/15 text-blue-400 border border-blue-500/20">
                    <i data-lucide="file-text" class="w-4 h-4 shrink-0 text-blue-400"></i> Placement Tests
                </a>
                <a href="student-coding.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="code" class="w-4 h-4 shrink-0"></i> Coding Challenges
                </a>
                <a href="student-interview-setup.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="mic" class="w-4 h-4 shrink-0"></i> AI Interview
                </a>
                <a href="student-leaderboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="trophy" class="w-4 h-4 shrink-0"></i> Leaderboard
                </a>
                <a href="student-profile.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="user" class="w-4 h-4 shrink-0"></i> Profile
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0 h-full">
            <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200/80 dark:border-slate-800/60 flex items-center justify-between px-4 lg:px-6 shrink-0 z-20">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800">
                        <i data-lucide="menu" class="w-5 h-5 text-slate-600 dark:text-slate-400"></i>
                    </button>
                    <h2 class="font-bold text-lg hidden sm:block">Placement Tests</h2>
                </div>
                <div class="flex items-center gap-1.5">
                    <button onclick="toggleTheme()" class="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                        <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 lg:p-6 bg-slate-50/50 dark:bg-[#0a0f1e]/50">
                <div class="flex flex-col gap-6 max-w-6xl mx-auto pb-12">
                    <div>
                        <h1 class="text-2xl font-black text-slate-800 dark:text-white">Placement Preparation Tests</h1>
                    </div>

                    <!-- Filter Row -->
                    <div class="bg-white dark:bg-slate-900 p-4 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div class="flex-1 relative">
                            <i data-lucide="search" class="w-4 h-4 absolute left-3 top-3 text-slate-400"></i>
                            <input type="text" id="searchInput" placeholder="Search by test name..." class="w-full pl-9 pr-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-sm focus:outline-none focus:border-blue-500 text-slate-900 dark:text-white transition-colors" onchange="fetchTests()" onkeyup="if(event.key==='Enter')fetchTests()">
                        </div>
                        <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                            <select id="categorySelect" class="bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-white text-sm rounded-xl px-4 py-2.5 focus:outline-none focus:border-blue-500 w-44" onchange="fetchTests()">
                                <option value="">All Categories</option>
                            </select>
                            <select id="difficultySelect" class="bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-white text-sm rounded-xl px-4 py-2.5 focus:outline-none focus:border-blue-500 w-40" onchange="fetchTests()">
                                <option value="">All Difficulties</option>
                                <option value="easy">Easy</option>
                                <option value="medium">Medium</option>
                                <option value="hard">Hard</option>
                                <option value="mixed">Mixed</option>
                            </select>
                        </div>
                    </div>

                    <!-- Main Grid -->
                    <div id="loader" class="flex justify-center py-12">
                        <div class="animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full"></div>
                    </div>

                    <div id="emptyState" class="hidden flex flex-col items-center justify-center p-12 bg-white dark:bg-slate-900 rounded-3xl border border-slate-100 dark:border-slate-800">
                        <div class="w-16 h-16 rounded-2xl bg-slate-50 dark:bg-slate-800 flex items-center justify-center text-slate-400 mb-4">
                            <i data-lucide="alert-circle" class="w-8 h-8"></i>
                        </div>
                        <h3 class="text-lg font-bold text-slate-800 dark:text-white mb-2">No Tests Found</h3>
                        <p class="text-sm text-slate-500 dark:text-slate-400 mb-6 text-center max-w-sm">There are no tests matching your search query or chosen filters. Try clearing filters or try a different keyword.</p>
                        <button onclick="resetFilters()" class="px-6 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold shadow-md hover:bg-blue-700 transition-colors">Reset Filters</button>
                    </div>

                    <div id="testsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
                        <!-- JS Inject -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        }

        let categoriesMap = {};

        document.addEventListener('DOMContentLoaded', async () => {
            const token = api.getToken();
            if(!token) { window.location.href='login.html'; return; }
            
            try {
                const res = await api.request('/categories');
                const cats = res.data || [];
                const catSelect = document.getElementById('categorySelect');
                cats.forEach(c => {
                    categoriesMap[c.name.toLowerCase()] = c._id;
                    const opt = document.createElement('option');
                    opt.value = c._id;
                    opt.textContent = c.name;
                    catSelect.appendChild(opt);
                });

                const params = new URLSearchParams(window.location.search);
                if(params.get('category')) {
                    const catParam = params.get('category').toLowerCase();
                    if(categoriesMap[catParam]) {
                        catSelect.value = categoriesMap[catParam];
                    } else {
                        // check if direct id
                        const exists = cats.find(c => c._id === params.get('category'));
                        if(exists) catSelect.value = params.get('category');
                    }
                }
            } catch(e) {
                console.error('Error fetching categories', e);
            }

            fetchTests();
        });

        async function fetchTests() {
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('testsGrid').classList.add('hidden');
            document.getElementById('emptyState').classList.add('hidden');

            const search = document.getElementById('searchInput').value.trim();
            const category = document.getElementById('categorySelect').value;
            const difficulty = document.getElementById('difficultySelect').value;

            try {
                let url = '/tests?';
                if(category) url += `category=${category}&`;
                if(difficulty) url += `difficulty=${difficulty}&`;

                const res = await api.request(url);
                let tests = res.data || [];

                if(search) {
                    tests = tests.filter(t => t.name.toLowerCase().includes(search.toLowerCase()) || (t.description && t.description.toLowerCase().includes(search.toLowerCase())));
                }

                if(tests.length === 0) {
                    document.getElementById('emptyState').classList.remove('hidden');
                    document.getElementById('emptyState').classList.add('flex');
                } else {
                    renderTests(tests);
                    document.getElementById('testsGrid').classList.remove('hidden');
                }

            } catch(e) {
                console.error('Error fetching tests', e);
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('categorySelect').value = '';
            document.getElementById('difficultySelect').value = '';
            fetchTests();
        }

        function getDiffColor(diff) {
            switch(diff) {
                case 'easy': return 'bg-emerald-100 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-400';
                case 'medium': return 'bg-amber-100 text-amber-700 dark:bg-amber-500/10 dark:text-amber-400';
                case 'hard': return 'bg-rose-100 text-rose-700 dark:bg-rose-500/10 dark:text-rose-400';
                default: return 'bg-blue-100 text-blue-700 dark:bg-blue-500/10 dark:text-blue-400';
            }
        }

        function renderTests(tests) {
            const grid = document.getElementById('testsGrid');
            grid.innerHTML = tests.map(test => `
                <div class="bg-white dark:bg-slate-900 rounded-3xl border border-slate-100 dark:border-slate-800/80 hover:border-blue-500/30 transition-all p-6 flex flex-col justify-between shadow-sm">
                    <div>
                        <div class="flex justify-between items-start gap-2 mb-3">
                            <span class="px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-400">
                                ${test.category?.name || 'Category'}
                            </span>
                            <span class="px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider ${getDiffColor(test.difficulty)}">
                                ${test.difficulty}
                            </span>
                        </div>
                        <h3 class="text-base font-bold text-slate-800 dark:text-white mb-2 line-clamp-1">
                            ${test.name}
                        </h3>
                        <p class="text-xs text-slate-500 dark:text-slate-400 mb-6 line-clamp-2 leading-relaxed min-h-[32px]">
                            ${test.description || 'Practice this test to test your abilities and speed under timed circumstances.'}
                        </p>
                    </div>

                    <div class="pt-4 border-t border-slate-50 dark:border-slate-800 flex flex-col gap-4">
                        <div class="grid grid-cols-3 gap-2 text-center text-slate-500 dark:text-slate-400">
                            <div>
                                <p class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Questions</p>
                                <p class="text-sm font-black text-slate-700 dark:text-slate-300 flex items-center justify-center gap-1 mt-0.5">
                                    <i data-lucide="help-circle" class="w-3.5 h-3.5 text-blue-500"></i> ${test.totalQuestions}
                                </p>
                            </div>
                            <div>
                                <p class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Duration</p>
                                <p class="text-sm font-black text-slate-700 dark:text-slate-300 flex items-center justify-center gap-1 mt-0.5">
                                    <i data-lucide="clock" class="w-3.5 h-3.5 text-indigo-500"></i> ${test.totalTime}m
                                </p>
                            </div>
                            <div>
                                <p class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Pass Mark</p>
                                <p class="text-sm font-black text-slate-700 dark:text-slate-300 flex items-center justify-center gap-1 mt-0.5">
                                    <i data-lucide="trophy" class="w-3.5 h-3.5 text-amber-500"></i> ${test.passingMarks}
                                </p>
                            </div>
                        </div>

                        <button onclick="window.location.href='test-start.html?id=${test._id}'" class="w-full py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs shadow-lg shadow-blue-500/20 transition-colors">
                            View Details & Start
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }
    </script>
</body>
</html>
