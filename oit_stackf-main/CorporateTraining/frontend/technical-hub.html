<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIT_STACK - Coding Problems</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- API Config -->
    <script src="api.js"></script>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 font-sans transition-colors duration-300 pb-12">

    <!-- Navbar -->
    <nav class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200/80 dark:border-slate-800/60 flex items-center justify-between px-6 z-50 sticky top-0">
        <div class="flex items-center gap-3">
            <img src="../image/logo.jpg" alt="OIT_STACK" class="w-8 h-8 object-cover rounded-lg shadow-sm" />
            <span class="font-bold text-slate-900 dark:text-white text-sm">OIT_STACK</span>
        </div>
        <div class="flex items-center gap-4">
            <a href="student-dashboard.html" class="text-sm font-bold text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white transition-colors">Dashboard</a>
            <button onclick="toggleTheme()" class="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
            </button>
        </div>
    </nav>

    <div id="loader" class="flex justify-center items-center h-64">
        <div class="animate-spin h-8 w-8 border-4 border-indigo-500 border-t-transparent rounded-full"></div>
    </div>

    <div id="content" class="hidden flex-col gap-6 max-w-5xl mx-auto mt-8 px-4">
        
        <div>
            <h1 class="text-2xl font-black text-slate-800 dark:text-white">Coding Problems</h1>
        </div>

        <!-- Stats Bar -->
        <div class="p-6 rounded-2xl bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 shadow-sm">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 items-center">
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Total Progress</p>
                    <h2 id="statProgress" class="text-2xl font-black text-slate-800 dark:text-white mt-1">0 / 0 Solved</h2>
                    <div class="w-full bg-slate-100 dark:bg-slate-800 h-2 rounded-full mt-2.5 overflow-hidden">
                        <div id="statBar" class="bg-gradient-to-r from-blue-500 to-indigo-500 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>

                <div class="flex flex-col gap-1 p-4 bg-slate-50/50 dark:bg-slate-800/20 rounded-2xl border border-slate-100 dark:border-slate-800/40">
                    <span class="text-[10px] font-bold text-slate-400 uppercase">Easy Completed</span>
                    <span id="statEasy" class="text-lg font-extrabold text-emerald-600 dark:text-emerald-400">0 Solved</span>
                </div>

                <div class="flex flex-col gap-1 p-4 bg-slate-50/50 dark:bg-slate-800/20 rounded-2xl border border-slate-100 dark:border-slate-800/40">
                    <span class="text-[10px] font-bold text-slate-400 uppercase">Medium Completed</span>
                    <span id="statMedium" class="text-lg font-extrabold text-amber-600 dark:text-amber-400">0 Solved</span>
                </div>

                <div class="flex flex-col gap-1 p-4 bg-slate-50/50 dark:bg-slate-800/20 rounded-2xl border border-slate-100 dark:border-slate-800/40">
                    <span class="text-[10px] font-bold text-slate-400 uppercase">Hard Completed</span>
                    <span id="statHard" class="text-lg font-extrabold text-rose-600 dark:text-rose-400">0 Solved</span>
                </div>
            </div>
        </div>

        <!-- Filters Card -->
        <div class="p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="relative w-full md:w-auto flex-1 max-w-md">
                <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-slate-400"></i>
                <input type="text" id="searchInput" oninput="fetchProblems()" placeholder="Search by problem title..." class="w-full pl-9 pr-4 py-2 text-sm rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-colors placeholder-slate-400">
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto">
                <select id="difficultyFilter" onchange="fetchProblems()" class="w-full md:w-48 pl-4 pr-10 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 appearance-none transition-colors">
                    <option value="">All Difficulties</option>
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
        </div>

        <!-- Listing Grid -->
        <div id="emptyState" class="hidden py-12 px-4 flex-col items-center justify-center text-center rounded-2xl border-2 border-dashed border-slate-200 dark:border-slate-800">
            <div class="w-16 h-16 bg-slate-50 dark:bg-slate-800/50 text-slate-400 rounded-2xl flex items-center justify-center mb-4">
                <i data-lucide="alert-circle" class="w-8 h-8"></i>
            </div>
            <h3 class="text-lg font-bold text-slate-800 dark:text-white mb-2">No Problems Found</h3>
            <p class="text-slate-500 text-sm max-w-sm mb-6 leading-relaxed">There are no coding challenges matching your search keywords or parameters.</p>
            <button onclick="document.getElementById('searchInput').value=''; document.getElementById('difficultyFilter').value=''; fetchProblems();" class="px-6 py-2.5 bg-blue-600 text-white font-bold text-sm rounded-xl hover:bg-blue-700 transition-colors">Clear Filters</button>
        </div>

        <div id="problemsTableContainer" class="hidden w-full overflow-x-auto rounded-3xl border border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm">
            <table class="w-full text-left border-collapse text-sm">
                <thead>
                    <tr class="bg-slate-50 dark:bg-slate-800/40 border-b border-slate-100 dark:border-slate-800 text-slate-500 dark:text-slate-400 font-bold uppercase tracking-wider text-xs">
                        <th class="px-6 py-4">Status</th>
                        <th class="px-6 py-4">Title</th>
                        <th class="px-6 py-4">Difficulty</th>
                        <th class="px-6 py-4">Leaderboard Points</th>
                        <th class="px-6 py-4">Action</th>
                    </tr>
                </thead>
                <tbody id="problemsTableBody" class="divide-y divide-slate-100 dark:divide-slate-800/60 font-semibold text-slate-700 dark:text-slate-200">
                    <!-- Rows injected here -->
                </tbody>
            </table>
        </div>

    </div>

    <!-- Toast Notification -->
    <div id="toast" class="hidden fixed top-4 right-4 z-50 p-4 rounded-xl text-sm font-semibold shadow-lg border"></div>

    <script>
        lucide.createIcons();

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `fixed top-4 right-4 z-50 p-4 rounded-xl text-sm font-semibold shadow-lg border transition-opacity ${
                type === 'success' 
                ? 'bg-white dark:bg-slate-900 text-slate-900 dark:text-white border-slate-200 dark:border-slate-800' 
                : 'bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 border-red-200 dark:border-red-800'
            }`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 5000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!api.getToken()) {
                window.location.href = 'login.html';
                return;
            }
            fetchProblems();
        });

        function getDifficultyBadge(diff) {
            if (diff === 'easy') return '<span class="px-2 py-1 text-[10px] font-bold uppercase rounded bg-emerald-100 text-emerald-800 dark:bg-emerald-900/30 dark:text-emerald-400">EASY</span>';
            if (diff === 'medium') return '<span class="px-2 py-1 text-[10px] font-bold uppercase rounded bg-amber-100 text-amber-800 dark:bg-amber-900/30 dark:text-amber-400">MEDIUM</span>';
            if (diff === 'hard') return '<span class="px-2 py-1 text-[10px] font-bold uppercase rounded bg-rose-100 text-rose-800 dark:bg-rose-900/30 dark:text-rose-400">HARD</span>';
            return '<span class="px-2 py-1 text-[10px] font-bold uppercase rounded bg-slate-100 text-slate-800 dark:bg-slate-900/30 dark:text-slate-400">INFO</span>';
        }

        async function fetchProblems() {
            try {
                const search = document.getElementById('searchInput').value.toLowerCase();
                const difficulty = document.getElementById('difficultyFilter').value;
                
                let query = '?limit=100';
                if (difficulty) query += `&difficulty=${difficulty}`;

                const res = await api.request(`/coding/problems${query}`);
                let list = res.data.problems || [];

                // Stats calculation (from the unfiltered list response to be consistent with original)
                const allProblems = list; 
                const solvedCount = allProblems.filter(p => p.isSolved).length;
                const totalCount = allProblems.length;
                const easy = allProblems.filter(p => p.difficulty === 'easy' && p.isSolved).length;
                const medium = allProblems.filter(p => p.difficulty === 'medium' && p.isSolved).length;
                const hard = allProblems.filter(p => p.difficulty === 'hard' && p.isSolved).length;

                document.getElementById('statProgress').textContent = `${solvedCount} / ${totalCount} Solved`;
                document.getElementById('statBar').style.width = totalCount > 0 ? `${(solvedCount / totalCount) * 100}%` : '0%';
                document.getElementById('statEasy').textContent = `${easy} Solved`;
                document.getElementById('statMedium').textContent = `${medium} Solved`;
                document.getElementById('statHard').textContent = `${hard} Solved`;

                // Client side search filter
                if (search) {
                    list = list.filter(p => p.title.toLowerCase().includes(search));
                }

                const tableContainer = document.getElementById('problemsTableContainer');
                const emptyState = document.getElementById('emptyState');
                
                if (list.length === 0) {
                    tableContainer.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                    emptyState.classList.add('flex');
                } else {
                    tableContainer.classList.remove('hidden');
                    emptyState.classList.add('hidden');

                    const tbody = document.getElementById('problemsTableBody');
                    tbody.innerHTML = list.map(p => {
                        const statusIcon = p.isSolved 
                            ? '<i data-lucide="check-circle" class="w-5 h-5 text-emerald-500 fill-emerald-500/10"></i>'
                            : '<span class="w-5 h-5 block rounded-full border-2 border-slate-200 dark:border-slate-800"></span>';
                        
                        const tagsHtml = (p.tags || []).slice(0, 3).map(t => `<span class="bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded-md">${t}</span>`).join('');

                        return `
                            <tr class="hover:bg-slate-50/50 dark:hover:bg-slate-800/20 transition-all duration-200">
                                <td class="px-6 py-4">${statusIcon}</td>
                                <td class="px-6 py-4">
                                    <div>
                                        <p class="text-slate-800 dark:text-white text-sm font-bold">${p.title}</p>
                                        <div class="flex gap-2 text-[10px] text-slate-400 font-medium mt-0.5">${tagsHtml}</div>
                                    </div>
                                </td>
                                <td class="px-6 py-4">${getDifficultyBadge(p.difficulty)}</td>
                                <td class="px-6 py-4 text-indigo-500 dark:text-indigo-400 flex items-center gap-1.5 mt-4">
                                    <i data-lucide="award" class="w-4 h-4"></i> ${p.points || 100} pts
                                </td>
                                <td class="px-6 py-4">
                                    <button onclick="window.location.href='coding-editor.html?id=${p._id}'" class="py-1.5 px-3 border border-slate-200 dark:border-slate-700 rounded-xl font-bold text-xs flex items-center gap-1.5 hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 group">
                                        Solve Problem <i data-lucide="chevron-right" class="w-4 h-4 transition-transform group-hover:translate-x-0.5"></i>
                                    </button>
                                </td>
                            </tr>
                        `;
                    }).join('');
                    lucide.createIcons();
                }

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                document.getElementById('content').classList.add('flex');

            } catch (err) {
                showToast(err.message || 'Error fetching problems', 'error');
            }
        }
    </script>
</body>
</html>
