<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIT_STACK - Test Result</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- API Config -->
    <script src="api.js"></script>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 font-sans transition-colors duration-300 pb-12">

    <!-- Navbar -->
    <nav class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200/80 dark:border-slate-800/60 flex items-center justify-between px-6 z-50 sticky top-0">
        <div class="flex items-center gap-3">
            <img src="../image/logo.jpg" alt="OIT_STACK" class="w-8 h-8 object-cover rounded-lg shadow-sm" />
            <span class="font-bold text-slate-900 dark:text-white text-sm">OIT_STACK</span>
        </div>
        <button onclick="toggleTheme()" class="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
            <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
            <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
        </button>
    </nav>

    <div id="loader" class="flex justify-center items-center h-64">
        <div class="animate-spin h-8 w-8 border-4 border-indigo-500 border-t-transparent rounded-full"></div>
    </div>

    <div id="content" class="hidden flex-col gap-6 max-w-4xl mx-auto mt-8 px-4">
        
        <!-- Back link -->
        <div>
            <a href="student-dashboard.html" class="inline-flex items-center text-sm text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white transition-colors">
                <i data-lucide="chevron-left" class="w-4 h-4 mr-1.5"></i> Back to Dashboard
            </a>
        </div>

        <!-- Main Score Card Banner -->
        <div id="resultBanner" class="relative overflow-hidden p-8 rounded-2xl border-none text-white shadow-xl bg-gradient-to-br">
            <div class="absolute top-0 right-0 w-80 h-80 bg-white/5 rounded-full translate-x-14 -translate-y-14 blur-xl"></div>
            <div class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-8">
                <div class="flex flex-col gap-3 text-center md:text-left">
                    <span class="px-2 py-1 text-[10px] uppercase font-bold rounded-md bg-white/20 text-white self-center md:self-start">Result Released</span>
                    <h1 id="resultTitle" class="text-2xl md:text-3xl font-extrabold tracking-tight"></h1>
                    <p id="resultDesc" class="text-white/80 text-sm max-w-md leading-relaxed"></p>
                </div>
                <!-- Circular Progress Circle -->
                <div class="flex flex-col items-center gap-2 shrink-0">
                    <div class="relative w-32 h-32 rounded-full border-[10px] border-white/25 flex items-center justify-center">
                        <div class="text-center">
                            <span id="resultScore" class="text-3xl font-black"></span>
                            <p id="resultStatus" class="text-[10px] text-white/70 uppercase tracking-widest font-bold mt-0.5"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats Breakdown Card -->
        <div class="p-6 rounded-2xl bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 shadow-sm">
            <h3 class="font-bold text-slate-800 dark:text-white mb-4">Attempt Summary</h3>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 text-center">
                <div class="p-4 rounded-2xl bg-slate-50 dark:bg-slate-800/40">
                    <p class="text-[10px] uppercase font-bold text-slate-400">Score Obtained</p>
                    <p id="statMarks" class="text-lg font-black text-slate-800 dark:text-white mt-1"></p>
                </div>
                <div class="p-4 rounded-2xl bg-emerald-50 dark:bg-emerald-500/5 border border-emerald-100/50 dark:border-emerald-500/10 text-emerald-600 dark:text-emerald-400">
                    <p class="text-[10px] uppercase font-bold text-emerald-500">Correct Answers</p>
                    <p id="statCorrect" class="text-lg font-black mt-1"></p>
                </div>
                <div class="p-4 rounded-2xl bg-rose-50 dark:bg-rose-500/5 border border-rose-100/50 dark:border-rose-500/10 text-rose-600 dark:text-rose-400">
                    <p class="text-[10px] uppercase font-bold text-rose-500">Wrong Answers</p>
                    <p id="statWrong" class="text-lg font-black mt-1"></p>
                </div>
                <div class="p-4 rounded-2xl bg-slate-50 dark:bg-slate-800/40 text-slate-600 dark:text-slate-400">
                    <p class="text-[10px] uppercase font-bold text-slate-400">Skipped Answers</p>
                    <p id="statSkipped" class="text-lg font-black mt-1"></p>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row items-center gap-4 mt-6 pt-6 border-t border-slate-100 dark:border-slate-800/80 justify-between text-slate-500 text-sm">
                <div class="flex items-center gap-2">
                    <i data-lucide="clock" class="w-4 h-4 text-indigo-500"></i>
                    <span id="statTime"></span>
                    <span>•</span>
                    <span id="statLimit"></span>
                </div>
                <div class="flex gap-3">
                    <button onclick="window.location.href='take-test.html?id=' + testId" class="px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-xl font-bold text-xs flex items-center gap-1.5 hover:bg-slate-50 dark:hover:bg-slate-800">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Reattempt Test
                    </button>
                    <button onclick="window.location.href='student-dashboard.html'" class="px-3 py-2 bg-blue-600 text-white rounded-xl font-bold text-xs flex items-center gap-1.5 hover:bg-blue-700">
                        Browse Other Tests <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Review Section -->
        <div>
            <h3 class="text-lg font-bold text-slate-800 dark:text-white mb-4">Question Key & Explanations</h3>
            <div id="questionsList" class="flex flex-col gap-5">
                <!-- Injected questions -->
            </div>
        </div>

    </div>

    <!-- Toast Notification -->
    <div id="toast" class="hidden fixed top-4 right-4 z-50 p-4 rounded-xl text-sm font-semibold shadow-lg border"></div>

    <script>
        lucide.createIcons();

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `fixed top-4 right-4 z-50 p-4 rounded-xl text-sm font-semibold shadow-lg border transition-opacity ${
                type === 'success' 
                ? 'bg-white dark:bg-slate-900 text-slate-900 dark:text-white border-slate-200 dark:border-slate-800' 
                : 'bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 border-red-200 dark:border-red-800'
            }`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 5000);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const testId = urlParams.get('id');

        document.addEventListener('DOMContentLoaded', async () => {
            if (!api.getToken() || !testId) {
                window.location.href = 'student-dashboard.html';
                return;
            }

            try {
                // Fetch recent test results for this testId
                const historyRes = await api.request(`/results/my-results?testId=${testId}&limit=1`);
                const resultsList = historyRes.data.results || [];

                if (resultsList.length === 0) {
                    showToast('No results found for this test session.', 'error');
                    setTimeout(() => window.location.href = 'student-dashboard.html', 2000);
                    return;
                }

                // Fetch details
                const detailedRes = await api.request(`/results/${resultsList[0]._id}`);
                const result = detailedRes.data;
                const testInfo = result.test || {};
                const percentage = Math.round(result.percentage || 0);

                let correctCount = 0;
                let wrongCount = 0;
                let skippedCount = 0;

                result.answers.forEach(ans => {
                    if (ans.selectedAnswer === null || ans.selectedAnswer === undefined) skippedCount++;
                    else if (ans.isCorrect) correctCount++;
                    else wrongCount++;
                });

                // Populate Banner
                const banner = document.getElementById('resultBanner');
                if (result.passed) {
                    banner.classList.add('from-emerald-600', 'via-teal-600', 'to-cyan-600', 'shadow-emerald-500/10');
                    document.getElementById('resultTitle').textContent = 'Congratulations! You Passed! 🎉';
                    document.getElementById('resultStatus').textContent = 'Passed';
                } else {
                    banner.classList.add('from-rose-600', 'via-red-600', 'to-orange-600', 'shadow-rose-500/10');
                    document.getElementById('resultTitle').textContent = 'Keep Practicing, You Can Do It! 💪';
                    document.getElementById('resultStatus').textContent = 'Failed';
                }
                document.getElementById('resultDesc').textContent = `You completed the test "${testInfo.name}". Review your performance details and explanation key below.`;
                document.getElementById('resultScore').textContent = `${percentage}%`;

                // Populate Summary
                document.getElementById('statMarks').textContent = `${result.obtainedMarks} / ${result.totalMarks}`;
                document.getElementById('statCorrect').textContent = correctCount;
                document.getElementById('statWrong').textContent = wrongCount;
                document.getElementById('statSkipped').textContent = skippedCount;

                const timeMins = Math.floor(result.timeTaken / 60);
                const timeSecs = result.timeTaken % 60;
                document.getElementById('statTime').innerHTML = `Time Taken: <strong>${timeMins}m ${timeSecs}s</strong>`;
                document.getElementById('statLimit').innerHTML = `Exam Limit: <strong>${testInfo.totalTime || 30} Mins</strong>`;

                // Populate Review Section
                const qHtml = result.answers.map((ans, idx) => {
                    const q = ans.question || {};
                    const isUnanswered = ans.selectedAnswer === null || ans.selectedAnswer === undefined;
                    
                    let borderClass = 'border-l-slate-300 dark:border-l-slate-800';
                    let badgeHtml = '<span class="px-2 py-0.5 text-xs rounded bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-400">Unanswered</span>';
                    
                    if (!isUnanswered) {
                        if (ans.isCorrect) {
                            borderClass = 'border-l-emerald-500';
                            badgeHtml = '<span class="px-2 py-0.5 text-xs rounded flex items-center gap-1 bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400"><i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i> Correct</span>';
                        } else {
                            borderClass = 'border-l-rose-500';
                            badgeHtml = '<span class="px-2 py-0.5 text-xs rounded flex items-center gap-1 bg-rose-100 text-rose-700 dark:bg-rose-900/30 dark:text-rose-400"><i data-lucide="x-circle" class="w-3.5 h-3.5"></i> Incorrect</span>';
                        }
                    }

                    let optionsHtml = '';
                    if (q.options) {
                        optionsHtml = q.options.map((opt, optIdx) => {
                            const isSelected = ans.selectedAnswer === optIdx;
                            const isCorrectAnswer = q.correctAnswer === optIdx;
                            
                            let optClass = 'border-slate-100 dark:border-slate-800 bg-slate-50/20';
                            if (isSelected) {
                                optClass = ans.isCorrect ? 'border-emerald-500 bg-emerald-50/5 dark:bg-emerald-500/5' : 'border-rose-500 bg-rose-50/5 dark:bg-rose-500/5';
                            }
                            if (isCorrectAnswer && !ans.isCorrect) {
                                optClass = 'border-emerald-500/60 bg-emerald-50/10 dark:bg-emerald-500/10';
                            }

                            return `
                                <div class="flex items-center justify-between p-3 rounded-xl border text-xs font-semibold leading-relaxed ${optClass}">
                                    <span>${opt}</span>
                                    ${isCorrectAnswer ? '<span class="text-[10px] uppercase font-extrabold text-emerald-500 tracking-wider">Correct Key</span>' : ''}
                                </div>
                            `;
                        }).join('');
                    }

                    const explHtml = q.explanation ? `
                        <div class="mt-2 p-4 rounded-xl bg-blue-50/30 dark:bg-slate-800/60 border border-blue-50/20 dark:border-slate-800 text-xs leading-relaxed text-slate-600 dark:text-slate-400">
                            <p class="font-bold text-blue-500 dark:text-indigo-400 mb-1 flex items-center gap-1.5"><i data-lucide="help-circle" class="w-4 h-4"></i> Explanation</p>
                            ${q.explanation}
                        </div>
                    ` : '';

                    return `
                        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 border-l-[6px] p-5 ${borderClass}">
                            <div class="flex flex-col gap-4">
                                <div class="flex items-center justify-between">
                                    <span class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Question ${idx + 1} (${q.difficulty})</span>
                                    ${badgeHtml}
                                </div>
                                <p class="text-sm font-bold text-slate-800 dark:text-white leading-relaxed">${q.question}</p>
                                <div class="flex flex-col gap-2">${optionsHtml}</div>
                                ${explHtml}
                            </div>
                        </div>
                    `;
                }).join('');

                document.getElementById('questionsList').innerHTML = qHtml;
                lucide.createIcons();

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                document.getElementById('content').classList.add('flex');

            } catch (err) {
                showToast(err.message || 'Error fetching test result', 'error');
                setTimeout(() => window.location.href = 'student-dashboard.html', 2000);
            }
        });
    </script>
</body>
</html>
