<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Categories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="api.js"></script>
</head>
<body class="bg-slate-50 dark:bg-[#0a0f1e] text-slate-900 dark:text-white font-sans overflow-hidden">
    
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-slate-900 dark:bg-[#0d1117] border-r border-slate-800/60 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col">
            <div class="h-16 flex items-center justify-between px-5 border-b border-slate-800/60">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                        <i data-lucide="shield-check" class="w-4 h-4 text-white"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-white text-sm leading-none">OIT_STACK</h1>
                        <p class="text-[10px] text-slate-500 font-medium mt-0.5">Admin Portal</p>
                    </div>
                </div>
            </div>
            
            <nav class="flex-1 py-3 px-3 overflow-y-auto space-y-0.5">
                <a href="admin-dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="layout-dashboard" class="w-4 h-4 shrink-0"></i> Dashboard
                </a>
                <a href="admin-students.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="users" class="w-4 h-4 shrink-0"></i> Students
                </a>
                <!-- We add categories link just in case they need to access it natively -->
                <a href="admin-categories.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium bg-indigo-500/15 text-indigo-400 border border-indigo-500/20">
                    <i data-lucide="folder-tree" class="w-4 h-4 shrink-0 text-indigo-400"></i> Categories
                </a>
                <a href="admin-questions.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="database" class="w-4 h-4 shrink-0"></i> Question Pool
                </a>
                <a href="admin-tests.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="file-text" class="w-4 h-4 shrink-0"></i> Tests
                </a>
                <a href="admin-coding.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="code" class="w-4 h-4 shrink-0"></i> Coding Challenges
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0 h-full">
            <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200/80 dark:border-slate-800/60 flex items-center justify-between px-4 lg:px-6 shrink-0 z-20">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800">
                        <i data-lucide="menu" class="w-5 h-5 text-slate-600 dark:text-slate-400"></i>
                    </button>
                    <h2 class="font-bold text-lg hidden sm:block">Category Directory</h2>
                </div>
                <div class="flex items-center gap-1.5">
                    <button onclick="toggleTheme()" class="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                        <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 lg:p-6 bg-slate-50/50 dark:bg-[#0a0f1e]/50">
                <div class="max-w-6xl mx-auto flex flex-col gap-8 pb-12">
                    
                    <div>
                        <h1 class="text-2xl font-black text-slate-800 dark:text-white">Category Directory</h1>
                    </div>

                    <div id="loader" class="flex justify-center py-12">
                        <div class="animate-spin h-8 w-8 border-4 border-indigo-500 border-t-transparent rounded-full"></div>
                    </div>

                    <div id="catContent" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                        
                        <!-- Left: Categories -->
                        <div class="flex flex-col gap-4">
                            <div class="flex justify-between items-center">
                                <h3 class="font-extrabold text-sm text-slate-400 uppercase tracking-wider">Parent Categories</h3>
                                <button onclick="openCatModal()" class="px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-700 text-xs font-bold hover:bg-slate-50 dark:hover:bg-slate-800 flex items-center gap-1.5 transition-colors">
                                    <i data-lucide="plus-circle" class="w-3.5 h-3.5"></i> Add Category
                                </button>
                            </div>
                            <div id="catList" class="grid grid-cols-1 gap-4">
                                <!-- JS Inject -->
                            </div>
                        </div>

                        <!-- Right: Subcategories -->
                        <div class="flex flex-col gap-4">
                            <div class="flex justify-between items-center">
                                <h3 class="font-extrabold text-sm text-slate-400 uppercase tracking-wider">Granular Topics / Subcategories</h3>
                                <button id="addSubBtn" onclick="openSubModal()" disabled class="px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-700 text-xs font-bold hover:bg-slate-50 dark:hover:bg-slate-800 flex items-center gap-1.5 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                                    <i data-lucide="plus-circle" class="w-3.5 h-3.5"></i> Add Topic
                                </button>
                            </div>
                            <div class="bg-white dark:bg-slate-900 rounded-3xl border border-slate-100 dark:border-slate-800 overflow-hidden shadow-sm">
                                <div id="subLoader" class="flex justify-center py-12 hidden">
                                    <div class="animate-spin h-6 w-6 border-4 border-indigo-500 border-t-transparent rounded-full"></div>
                                </div>
                                <div id="subEmpty" class="py-24 text-center text-slate-400 text-xs">
                                    Select a parent category on the left to review its topics.
                                </div>
                                <table id="subTable" class="w-full text-left border-collapse text-xs hidden">
                                    <thead>
                                        <tr class="bg-slate-50 dark:bg-slate-800/30 border-b border-slate-100 dark:border-slate-800 text-slate-500 dark:text-slate-400 font-bold uppercase tracking-wider text-[10px]">
                                            <th class="px-6 py-3">Topic Title</th>
                                            <th class="px-6 py-3 text-right">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="subList" class="divide-y divide-slate-100 dark:divide-slate-800/60 font-semibold text-slate-700 dark:text-slate-200">
                                        <!-- JS Inject -->
                                    </tbody>
                                </table>
                            </div>
                        </div>

                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Category Modal -->
    <div id="catModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 rounded-3xl w-full max-w-md overflow-hidden shadow-2xl flex flex-col">
            <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
                <h3 id="catModalTitle" class="font-bold text-lg text-slate-800 dark:text-white">Create Parent Category</h3>
            </div>
            <form id="catForm" class="p-6 flex flex-col gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1.5">Category Title</label>
                    <input type="text" id="catName" required class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1.5">Platform Category Type</label>
                    <select id="catType" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:outline-none focus:border-indigo-500">
                        <option value="aptitude">Quantitative & Logical Aptitude</option>
                        <option value="technical">Technical Core MCQ</option>
                        <option value="coding">Coding Problems</option>
                    </select>
                </div>
                <div class="flex justify-end gap-3 mt-4">
                    <button type="button" onclick="closeCatModal()" class="px-4 py-2 rounded-xl text-sm font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">Cancel</button>
                    <button type="submit" id="catSaveBtn" class="px-6 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm shadow-md transition-colors">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Subcategory Modal -->
    <div id="subModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 rounded-3xl w-full max-w-md overflow-hidden shadow-2xl flex flex-col">
            <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
                <h3 id="subModalTitle" class="font-bold text-lg text-slate-800 dark:text-white">Add Topic</h3>
            </div>
            <form id="subForm" class="p-6 flex flex-col gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1.5">Topic Title</label>
                    <input type="text" id="subName" required class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:outline-none focus:border-indigo-500">
                </div>
                <div class="flex justify-end gap-3 mt-4">
                    <button type="button" onclick="closeSubModal()" class="px-4 py-2 rounded-xl text-sm font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">Cancel</button>
                    <button type="submit" id="subSaveBtn" class="px-6 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm shadow-md transition-colors">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        }

        let categories = [];
        let subcategories = [];
        let activeParent = null;

        let editCatId = null;
        let editSubId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const token = api.getToken();
            if(!token) { window.location.href='login.html'; return; }
            await loadCategories();
        });

        async function loadCategories() {
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('catContent').classList.add('hidden');
            try {
                const res = await api.request('/categories');
                categories = res.data || [];
                
                if (categories.length > 0 && !activeParent) {
                    activeParent = categories[0]._id;
                }
                
                renderCategories();
                
                if (activeParent) {
                    loadSubcategories(activeParent);
                }

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('catContent').classList.remove('hidden');
                document.getElementById('catContent').classList.add('grid');
            } catch(e) {
                console.error(e);
            }
        }

        function renderCategories() {
            const list = document.getElementById('catList');
            list.innerHTML = categories.map(cat => {
                const isActive = activeParent === cat._id;
                const borderClass = isActive 
                    ? 'border-indigo-500 bg-indigo-50/10 dark:bg-slate-900/60' 
                    : 'border-slate-100 dark:border-slate-800/80 hover:border-slate-200 cursor-pointer';

                return `
                <div onclick="selectParent('${cat._id}')" class="p-5 rounded-3xl flex flex-col justify-between border-2 transition-all duration-200 ${borderClass}">
                    <div class="flex justify-between items-start gap-4">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-400 flex items-center justify-center shrink-0">
                                <i data-lucide="folder" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <h4 class="font-extrabold text-slate-800 dark:text-white text-sm">${cat.name}</h4>
                                <p class="text-[10px] text-slate-400 capitalize mt-0.5">${cat.type} Type</p>
                            </div>
                        </div>
                        <div class="flex gap-1.5">
                            <button onclick="event.stopPropagation(); openCatModal('${cat._id}')" class="p-1 text-slate-400 hover:text-slate-600 dark:hover:text-white">
                                <i data-lucide="edit-2" class="w-4 h-4"></i>
                            </button>
                            <button onclick="event.stopPropagation(); deleteCategory('${cat._id}')" class="p-1 text-rose-400 hover:text-rose-600">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
            lucide.createIcons();
            
            document.getElementById('addSubBtn').disabled = !activeParent;
        }

        async function selectParent(id) {
            activeParent = id;
            renderCategories();
            loadSubcategories(id);
        }

        async function loadSubcategories(parentId) {
            document.getElementById('subEmpty').classList.add('hidden');
            document.getElementById('subTable').classList.add('hidden');
            document.getElementById('subLoader').classList.remove('hidden');

            try {
                const res = await api.request(`/categories/${parentId}/subcategories`);
                subcategories = res.data || [];
                
                document.getElementById('subLoader').classList.add('hidden');
                
                if (subcategories.length === 0) {
                    document.getElementById('subEmpty').textContent = 'No subcategories found for this category.';
                    document.getElementById('subEmpty').classList.remove('hidden');
                } else {
                    document.getElementById('subTable').classList.remove('hidden');
                    const tbody = document.getElementById('subList');
                    tbody.innerHTML = subcategories.map(sub => `
                    <tr class="hover:bg-slate-50/20">
                        <td class="px-6 py-3 font-extrabold text-slate-700 dark:text-slate-200">${sub.name}</td>
                        <td class="px-6 py-3 text-right">
                            <button onclick="openSubModal('${sub._id}')" class="p-1 text-slate-400 hover:text-slate-600 dark:hover:text-white mr-1">
                                <i data-lucide="edit-2" class="w-3.5 h-3.5"></i>
                            </button>
                            <button onclick="deleteSubcategory('${sub._id}')" class="p-1 text-rose-400 hover:text-rose-600">
                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                            </button>
                        </td>
                    </tr>
                    `).join('');
                    lucide.createIcons();
                }

            } catch(e) {
                console.error(e);
            }
        }

        function openCatModal(id = null) {
            editCatId = id;
            document.getElementById('catModal').classList.remove('hidden');
            if(id) {
                document.getElementById('catModalTitle').textContent = 'Modify Category';
                const c = categories.find(x => x._id === id);
                document.getElementById('catName').value = c.name;
                document.getElementById('catType').value = c.type;
            } else {
                document.getElementById('catModalTitle').textContent = 'Create Parent Category';
                document.getElementById('catName').value = '';
                document.getElementById('catType').value = 'aptitude';
            }
        }
        function closeCatModal() { document.getElementById('catModal').classList.add('hidden'); }

        document.getElementById('catForm').addEventListener('submit', async(e) => {
            e.preventDefault();
            const btn = document.getElementById('catSaveBtn');
            btn.disabled = true;
            
            const payload = {
                name: document.getElementById('catName').value.trim(),
                type: document.getElementById('catType').value
            };

            try {
                if(editCatId) {
                    await api.request(`/categories/${editCatId}`, { method: 'PUT', body: JSON.stringify(payload) });
                } else {
                    await api.request(`/categories`, { method: 'POST', body: JSON.stringify(payload) });
                }
                closeCatModal();
                await loadCategories();
            } catch(err) {
                alert(err.message);
            } finally {
                btn.disabled = false;
            }
        });

        async function deleteCategory(id) {
            if(confirm('Are you sure you want to permanently delete this category?')) {
                try {
                    await api.request(`/categories/${id}`, { method: 'DELETE' });
                    if(activeParent === id) activeParent = null;
                    await loadCategories();
                } catch(e) {
                    alert(e.message);
                }
            }
        }

        function openSubModal(id = null) {
            editSubId = id;
            document.getElementById('subModal').classList.remove('hidden');
            if(id) {
                document.getElementById('subModalTitle').textContent = 'Modify Topic';
                const s = subcategories.find(x => x._id === id);
                document.getElementById('subName').value = s.name;
            } else {
                document.getElementById('subModalTitle').textContent = 'Add Topic';
                document.getElementById('subName').value = '';
            }
        }
        function closeSubModal() { document.getElementById('subModal').classList.add('hidden'); }

        document.getElementById('subForm').addEventListener('submit', async(e) => {
            e.preventDefault();
            const btn = document.getElementById('subSaveBtn');
            btn.disabled = true;
            
            const payload = { name: document.getElementById('subName').value.trim() };

            try {
                if(editSubId) {
                    await api.request(`/categories/subcategories/${editSubId}`, { method: 'PUT', body: JSON.stringify(payload) });
                } else {
                    await api.request(`/categories/${activeParent}/subcategories`, { method: 'POST', body: JSON.stringify(payload) });
                }
                closeSubModal();
                await loadSubcategories(activeParent);
            } catch(err) {
                alert(err.message);
            } finally {
                btn.disabled = false;
            }
        });

        async function deleteSubcategory(id) {
            if(confirm('Are you sure you want to delete this topic?')) {
                try {
                    await api.request(`/categories/subcategories/${id}`, { method: 'DELETE' });
                    await loadSubcategories(activeParent);
                } catch(e) {
                    alert(e.message);
                }
            }
        }

    </script>
</body>
</html>
