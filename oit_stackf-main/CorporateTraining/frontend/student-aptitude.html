<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIT_STACK - Aptitude Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="api.js"></script>
</head>
<body class="bg-slate-50 dark:bg-[#0a0f1e] text-slate-900 dark:text-white font-sans overflow-hidden">
    
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-slate-900 dark:bg-[#0d1117] border-r border-slate-800/60 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col">
            <div class="h-16 flex items-center justify-between px-5 border-b border-slate-800/60">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/30">
                        <i data-lucide="zap" class="w-4 h-4 text-white"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-white text-sm leading-none">OIT_STACK</h1>
                        <p class="text-[10px] text-slate-500 font-medium mt-0.5">Student Portal</p>
                    </div>
                </div>
                <button onclick="toggleSidebar()" class="lg:hidden p-1.5 rounded-lg hover:bg-slate-800 text-slate-400">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            
            <nav class="flex-1 py-3 px-3 overflow-y-auto space-y-0.5">
                <a href="student-dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200 group">
                    <i data-lucide="layout-dashboard" class="w-4 h-4 shrink-0 text-slate-500 group-hover:text-slate-300"></i> Dashboard
                </a>
                <a href="student-aptitude.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium bg-blue-500/15 text-blue-400 border border-blue-500/20 group">
                    <i data-lucide="brain" class="w-4 h-4 shrink-0 text-blue-400"></i> Aptitude Hub
                    <span class="ml-auto w-1.5 h-1.5 rounded-full bg-blue-400"></span>
                </a>
                <a href="student-technical.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200 group">
                    <i data-lucide="terminal" class="w-4 h-4 shrink-0 text-slate-500 group-hover:text-slate-300"></i> Technical Hub
                </a>
            </nav>

            <div class="p-3 border-t border-slate-800/60">
                <div class="flex items-center gap-3 p-3 rounded-xl bg-slate-800/50 border border-slate-700/40">
                    <div id="userInitialsSidebar" class="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-bold text-sm">S</div>
                    <div class="flex-1 min-w-0">
                        <p id="userNameSidebar" class="text-sm font-semibold text-white truncate">Student</p>
                        <p id="userEmailSidebar" class="text-[10px] text-slate-500 truncate">student@example.com</p>
                    </div>
                    <button onclick="logout()" class="p-1.5 rounded-lg hover:bg-slate-700 transition-colors">
                        <i data-lucide="log-out" class="w-4 h-4 text-slate-500 hover:text-rose-400"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Overlay for mobile sidebar -->
        <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 hidden lg:hidden"></div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0 h-full">
            <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200/80 dark:border-slate-800/60 flex items-center justify-between px-4 lg:px-6 shrink-0 z-20">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800">
                        <i data-lucide="menu" class="w-5 h-5 text-slate-600 dark:text-slate-400"></i>
                    </button>
                    <h2 class="font-bold text-lg hidden sm:block">Aptitude Hub</h2>
                </div>
                <div class="flex items-center gap-1.5">
                    <button onclick="toggleTheme()" class="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                        <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
                    </button>
                    <div class="ml-1 pl-3 border-l border-slate-200 dark:border-slate-700">
                        <div id="userInitialsTopbar" class="w-8 h-8 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-bold text-xs shadow-md">S</div>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 lg:p-6 flex flex-col gap-6">
                <!-- Page Header -->
                <div>
                    <h1 class="text-2xl font-black mb-2">Quantitative & Reasoning Tests</h1>
                    <p class="text-slate-500 text-sm">Improve your core aptitude skills with carefully curated test modules.</p>
                </div>

                <!-- Tabs -->
                <div class="flex flex-wrap gap-2 p-1.5 bg-slate-200/50 dark:bg-slate-800/50 rounded-2xl w-fit">
                    <button onclick="switchTab('math')" id="tab-math" class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold bg-white dark:bg-slate-700 text-blue-600 dark:text-white shadow-sm transition-all">
                        Math / Quantitative
                    </button>
                    <button onclick="switchTab('verbal')" id="tab-verbal" class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all">
                        Verbal Ability
                    </button>
                    <button onclick="switchTab('nonverbal')" id="tab-nonverbal" class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all">
                        Non-Verbal Reasoning
                    </button>
                </div>

                <div id="loader" class="flex justify-center py-12">
                    <div class="animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full"></div>
                </div>

                <!-- Test List Container -->
                <div id="testContainer" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                    <!-- Tests injected here -->
                </div>
                
                <div id="emptyState" class="hidden py-16 flex-col items-center justify-center text-center rounded-2xl border-2 border-dashed border-slate-200 dark:border-slate-800">
                    <div class="w-16 h-16 bg-slate-100 dark:bg-slate-800 text-slate-400 rounded-2xl flex items-center justify-center mb-4">
                        <i data-lucide="inbox" class="w-8 h-8"></i>
                    </div>
                    <h3 class="text-lg font-bold mb-2">No tests found</h3>
                    <p class="text-slate-500 text-sm max-w-sm">There are currently no active tests in this category.</p>
                </div>
            </main>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }

        function logout() {
            api.removeToken();
            window.location.href = 'login.html';
        }

        let currentTab = 'math';
        let categories = [];
        let tests = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const token = api.getToken();
            if (!token) { window.location.href = 'login.html'; return; }

            try {
                const profileRes = await api.auth.getProfile();
                const initials = profileRes.data.user.name.charAt(0).toUpperCase();
                document.getElementById('userInitialsSidebar').textContent = initials;
                document.getElementById('userInitialsTopbar').textContent = initials;
                document.getElementById('userNameSidebar').textContent = profileRes.data.user.name;
                document.getElementById('userEmailSidebar').textContent = profileRes.data.user.email;

                // Load Categories
                const catRes = await api.request('/categories');
                categories = catRes.data;

                // Load all tests initially
                const testRes = await api.request('/tests');
                tests = testRes.data;

                renderTests();
            } catch (error) {
                console.error(error);
            }
        });

        function switchTab(tab) {
            currentTab = tab;
            
            // Update Tab UI
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = 'tab-btn px-6 py-2.5 rounded-xl text-sm font-bold text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all';
            });
            const activeBtn = document.getElementById(`tab-${tab}`);
            activeBtn.className = 'tab-btn px-6 py-2.5 rounded-xl text-sm font-bold bg-white dark:bg-slate-700 text-blue-600 dark:text-white shadow-sm transition-all';
            
            renderTests();
        }

        function renderTests() {
            document.getElementById('loader').classList.add('hidden');
            
            // Map tab to category name
            let targetCategoryName = '';
            if(currentTab === 'math') targetCategoryName = 'Math';
            if(currentTab === 'verbal') targetCategoryName = 'Verbal';
            if(currentTab === 'nonverbal') targetCategoryName = 'Non Verbal';

            const targetCategory = categories.find(c => c.name.toLowerCase() === targetCategoryName.toLowerCase());
            
            let filteredTests = [];
            if(targetCategory) {
                filteredTests = tests.filter(t => t.category && t.category._id === targetCategory._id);
            }

            const container = document.getElementById('testContainer');
            const empty = document.getElementById('emptyState');

            if (filteredTests.length === 0) {
                container.classList.add('hidden');
                empty.classList.remove('hidden');
                empty.classList.add('flex');
            } else {
                empty.classList.add('hidden');
                container.classList.remove('hidden');
                
                container.innerHTML = filteredTests.map(t => `
                    <div class="p-5 rounded-2xl bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 flex flex-col hover:border-blue-500/40 hover:shadow-lg hover:shadow-blue-500/5 transition-all group">
                        <div class="flex justify-between items-start mb-4">
                            <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 dark:bg-blue-500/10 dark:text-blue-400 flex items-center justify-center">
                                <i data-lucide="file-text" class="w-5 h-5"></i>
                            </div>
                            <span class="px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400">
                                ${t.difficulty || 'Mixed'}
                            </span>
                        </div>
                        <h3 class="font-bold text-lg mb-1 group-hover:text-blue-500 transition-colors line-clamp-1">${t.name}</h3>
                        <p class="text-xs text-slate-500 mb-6 flex-1 line-clamp-2">${t.description || 'No description provided.'}</p>
                        <div class="flex items-center justify-between mt-auto">
                            <div class="flex items-center gap-4 text-xs font-semibold text-slate-500">
                                <span class="flex items-center gap-1.5"><i data-lucide="clock" class="w-3.5 h-3.5"></i> ${t.totalTime}m</span>
                                <span class="flex items-center gap-1.5"><i data-lucide="help-circle" class="w-3.5 h-3.5"></i> ${t.totalQuestions}Q</span>
                            </div>
                            <button onclick="window.location.href='take-test.html?id=${t._id}'" class="px-4 py-2 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs shadow-md shadow-blue-500/20 transition-all">Start</button>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
