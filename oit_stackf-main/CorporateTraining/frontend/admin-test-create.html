<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIT_STACK - Create Test</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- API Config -->
    <script src="api.js"></script>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 font-sans transition-colors duration-300 pb-12">

    <!-- Topbar -->
    <nav class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200/80 dark:border-slate-800/60 flex items-center justify-between px-6 sticky top-0 z-30">
        <div class="flex items-center gap-3">
            <img src="../image/logo.jpg" alt="OIT_STACK" class="w-8 h-8 object-cover rounded-lg shadow-sm" />
            <span class="font-bold text-slate-900 dark:text-white text-sm">OIT_STACK ADMIN</span>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
            </button>
        </div>
    </nav>

    <div id="loader" class="flex justify-center items-center h-64">
        <div class="animate-spin h-8 w-8 border-4 border-indigo-500 border-t-transparent rounded-full"></div>
    </div>

    <div id="content" class="hidden flex-col gap-6 p-6 max-w-4xl mx-auto w-full">
        
        <div>
            <a href="admin-tests.html" class="inline-flex items-center text-sm text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white transition-colors font-bold mb-4">
                <i data-lucide="chevron-left" class="w-4 h-4 mr-1.5"></i> Back to Tests List
            </a>
            <h1 id="pageTitle" class="text-2xl font-black text-slate-900 dark:text-white">Create Test</h1>
            <p class="text-sm text-slate-400 mt-0.5">Select a category and enter how many questions to auto-pick.</p>
        </div>

        <form id="testForm" onsubmit="saveTest(event)" class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
            
            <!-- Left -->
            <div class="lg:col-span-2 flex flex-col gap-6">
                
                <!-- Basic Config -->
                <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 shadow-sm p-6 flex flex-col gap-5">
                    <h3 class="font-bold text-slate-800 dark:text-white pb-2 border-b border-slate-100 dark:border-slate-800">Basic Configuration</h3>
                    
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Test Name</label>
                        <input type="text" id="tName" required placeholder="e.g. Quantitative Reasoning Mock 1" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
                        <div class="flex flex-col gap-1.5">
                            <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Difficulty</label>
                            <select id="tDifficulty" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                                <option value="mixed">Mixed</option>
                                <option value="easy">Easy</option>
                                <option value="medium">Medium</option>
                                <option value="hard">Hard</option>
                            </select>
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Duration (mins)</label>
                            <input type="number" id="tTime" value="30" required min="1" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Passing Score</label>
                            <input type="number" id="tPass" value="10" required min="0" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                        </div>
                    </div>
                </div>

                <!-- Sections -->
                <div class="flex flex-col gap-4">
                    <div class="flex items-center justify-between">
                        <div>
                            <h3 class="font-bold text-slate-800 dark:text-white">Question Sections</h3>
                            <p class="text-xs text-slate-400 mt-0.5" id="sectionsSubtitle">Configure dynamic sections</p>
                        </div>
                        <button type="button" onclick="addSection()" class="flex items-center gap-1.5 px-3 py-1.5 border border-slate-200 dark:border-slate-700 rounded-xl text-xs font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                            <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add Section
                        </button>
                    </div>

                    <div id="sectionsContainer" class="flex flex-col gap-4">
                        <!-- Sections generated via JS -->
                    </div>
                </div>

            </div>

            <!-- Right: Advanced settings -->
            <div class="flex flex-col gap-6">
                <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 shadow-sm p-6 flex flex-col gap-5">
                    <h3 class="font-bold text-slate-800 dark:text-white pb-2 border-b border-slate-100 dark:border-slate-800">Advanced</h3>

                    <div class="flex items-center justify-between">
                        <div>
                            <label class="text-xs font-bold text-slate-700 dark:text-slate-300">Set Active</label>
                            <p class="text-[10px] text-slate-400 mt-0.5">Visible to students.</p>
                        </div>
                        <input type="checkbox" id="tActive" checked class="w-5 h-5 rounded-lg border-slate-300">
                    </div>

                    <div class="border-t border-slate-100 dark:border-slate-800 pt-4 flex flex-col gap-4">
                        <div class="flex items-center justify-between">
                            <div>
                                <label class="text-xs font-bold text-slate-700 dark:text-slate-300">Dynamic Generation</label>
                                <p class="text-[10px] text-slate-400 mt-0.5">Randomize per student.</p>
                            </div>
                            <input type="checkbox" id="tDynamic" checked class="w-5 h-5 rounded-lg border-slate-300">
                        </div>
                    </div>
                </div>

                <button type="submit" id="btnSave" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl flex justify-center items-center gap-2 transition-colors shadow-lg shadow-indigo-500/20">
                    <i data-lucide="save" class="w-4 h-4"></i> <span id="btnSaveText">Create Test</span>
                </button>
            </div>
        </form>

    </div>

    <!-- Toast Notification -->
    <div id="toast" class="hidden fixed top-4 right-4 z-50 p-4 rounded-xl text-sm font-semibold shadow-lg border"></div>

    <script>
        lucide.createIcons();

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `fixed top-4 right-4 z-50 p-4 rounded-xl text-sm font-semibold shadow-lg border transition-opacity ${
                type === 'success' 
                ? 'bg-white dark:bg-slate-900 text-slate-900 dark:text-white border-slate-200 dark:border-slate-800' 
                : 'bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 border-red-200 dark:border-red-800'
            }`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 5000);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const testId = urlParams.get('id');
        const isEdit = !!testId;

        let categories = [];
        let sections = [{ id: Date.now(), category: '', count: 10 }];

        document.addEventListener('DOMContentLoaded', async () => {
            if (!api.getToken()) { window.location.href = 'login.html'; return; }
            
            try {
                const res = await api.request('/admin/categories');
                categories = res.data;
            } catch(e) { console.error('Error fetching categories'); }

            if (isEdit) {
                document.getElementById('pageTitle').textContent = 'Modify Test';
                document.getElementById('btnSaveText').textContent = 'Save Changes';
                await loadTest();
            } else {
                renderSections();
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                document.getElementById('content').classList.add('flex');
            }
        });

        async function loadTest() {
            try {
                const res = await api.request(`/admin/tests/${testId}`);
                const test = res.data;
                document.getElementById('tName').value = test.name;
                document.getElementById('tDifficulty').value = test.difficulty || 'mixed';
                document.getElementById('tTime').value = test.totalTime;
                document.getElementById('tPass').value = test.passingMarks || 10;
                document.getElementById('tActive').checked = test.isActive !== false;
                document.getElementById('tDynamic').checked = test.isDynamic !== false;

                if (test.dynamicConfig && test.dynamicConfig.length > 0) {
                    sections = test.dynamicConfig.map((cfg, i) => ({
                        id: Date.now() + i,
                        category: cfg.category?._id || cfg.category || '',
                        count: cfg.count
                    }));
                }
                renderSections();
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                document.getElementById('content').classList.add('flex');
            } catch(e) {
                showToast('Failed to load test', 'error');
                setTimeout(() => window.location.href = 'admin-tests.html', 1500);
            }
        }

        function addSection() {
            sections.push({ id: Date.now(), category: '', count: 10 });
            renderSections();
        }

        function removeSection(id) {
            if(sections.length <= 1) { showToast('At least one section required', 'error'); return; }
            sections = sections.filter(s => s.id !== id);
            renderSections();
        }

        function updateSection(id, field, value) {
            const sec = sections.find(s => s.id === id);
            if(sec) sec[field] = value;
            if(field === 'count') renderSubtitle();
        }

        function renderSubtitle() {
            const total = sections.reduce((sum, s) => sum + parseInt(s.count || 0), 0);
            document.getElementById('sectionsSubtitle').textContent = `${total} questions total across ${sections.length} section(s)`;
        }

        function renderSections() {
            renderSubtitle();
            const container = document.getElementById('sectionsContainer');
            container.innerHTML = sections.map((s, idx) => `
                <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 shadow-sm p-5 flex flex-col gap-4">
                    <div class="flex items-center justify-between">
                        <span class="font-bold text-sm">Section ${idx + 1}</span>
                        ${sections.length > 1 ? `<button type="button" onclick="removeSection(${s.id})" class="p-1.5 text-rose-500 hover:bg-rose-50 rounded-xl transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="flex flex-col gap-1.5">
                            <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Category</label>
                            <select onchange="updateSection(${s.id}, 'category', this.value)" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                                <option value="">Select Category</option>
                                ${categories.map(c => `<option value="${c._id}" ${s.category === c._id ? 'selected' : ''}>${c.name}</option>`).join('')}
                            </select>
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Number of Questions</label>
                            <input type="number" oninput="updateSection(${s.id}, 'count', this.value)" value="${s.count}" min="1" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function saveTest(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSave');
            btn.disabled = true;
            btn.innerHTML = `<div class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></div> <span>Saving...</span>`;

            try {
                // Ensure all sections have category selected
                const validSections = sections.filter(s => s.category);
                if(validSections.length === 0) throw new Error('Please select a category for at least one section.');

                const isDynamic = document.getElementById('tDynamic').checked;
                const dynamicConfig = validSections.map(s => ({
                    category: s.category,
                    difficulty: 'mixed',
                    count: parseInt(s.count) || 10
                }));
                const totalQCount = dynamicConfig.reduce((sum, c) => sum + c.count, 0);

                const payload = {
                    name: document.getElementById('tName').value.trim(),
                    category: validSections[0].category, // primary category
                    difficulty: document.getElementById('tDifficulty').value,
                    totalTime: parseInt(document.getElementById('tTime').value),
                    passingMarks: parseFloat(document.getElementById('tPass').value),
                    isDynamic: isDynamic,
                    dynamicConfig: isDynamic ? dynamicConfig : [], // we only support dynamic UI here for simplicity
                    questions: [], 
                    totalQuestions: totalQCount,
                    isActive: document.getElementById('tActive').checked,
                    randomizeQuestions: true,
                    shuffleOptions: true,
                    negativeMarking: false
                };

                if (isEdit) {
                    await api.request(`/admin/tests/${testId}`, { method: 'PUT', body: JSON.stringify(payload) });
                    showToast('Test updated successfully!');
                } else {
                    await api.request('/admin/tests', { method: 'POST', body: JSON.stringify(payload) });
                    showToast('Test created successfully!');
                }
                setTimeout(() => window.location.href = 'admin-tests.html', 1000);

            } catch (err) {
                showToast(err.message || 'Error saving test.', 'error');
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="save" class="w-4 h-4"></i> <span>${isEdit ? 'Save Changes' : 'Create Test'}</span>`;
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
