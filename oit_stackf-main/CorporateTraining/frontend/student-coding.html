<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student - Coding Challenges</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="api.js"></script>
</head>
<body class="bg-slate-50 dark:bg-[#0a0f1e] text-slate-900 dark:text-white font-sans overflow-hidden">
    
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-slate-900 dark:bg-[#0d1117] border-r border-slate-800/60 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col">
            <div class="h-16 flex items-center justify-between px-5 border-b border-slate-800/60">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/30">
                        <i data-lucide="graduation-cap" class="w-4 h-4 text-white"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-white text-sm leading-none">OIT_STACK</h1>
                        <p class="text-[10px] text-slate-500 font-medium mt-0.5">Student Portal</p>
                    </div>
                </div>
            </div>
            
            <nav class="flex-1 py-3 px-3 overflow-y-auto space-y-0.5">
                <a href="student-dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="layout-dashboard" class="w-4 h-4 shrink-0"></i> Dashboard
                </a>
                <a href="student-tests.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="file-text" class="w-4 h-4 shrink-0"></i> Placement Tests
                </a>
                <a href="student-coding.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium bg-blue-500/15 text-blue-400 border border-blue-500/20">
                    <i data-lucide="code" class="w-4 h-4 shrink-0 text-blue-400"></i> Coding Challenges
                </a>
                <a href="student-interview-setup.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="mic" class="w-4 h-4 shrink-0"></i> AI Interview
                </a>
                <a href="student-leaderboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="trophy" class="w-4 h-4 shrink-0"></i> Leaderboard
                </a>
                <a href="student-profile.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="user" class="w-4 h-4 shrink-0"></i> Profile
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0 h-full">
            <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200/80 dark:border-slate-800/60 flex items-center justify-between px-4 lg:px-6 shrink-0 z-20">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800">
                        <i data-lucide="menu" class="w-5 h-5 text-slate-600 dark:text-slate-400"></i>
                    </button>
                    <h2 class="font-bold text-lg hidden sm:block">Coding Challenges</h2>
                </div>
                <div class="flex items-center gap-1.5">
                    <button onclick="toggleTheme()" class="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                        <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 lg:p-6 bg-slate-50/50 dark:bg-[#0a0f1e]/50">
                <div class="flex flex-col gap-6 max-w-6xl mx-auto pb-12">
                    <div>
                        <h1 class="text-2xl font-black text-slate-800 dark:text-white">Coding Problems</h1>
                    </div>

                    <!-- Stats Bar -->
                    <div class="bg-white dark:bg-slate-900 rounded-3xl p-6 border border-slate-100 dark:border-slate-800 shadow-sm">
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 items-center">
                            <div>
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Total Progress</p>
                                <h2 class="text-2xl font-black text-slate-800 dark:text-white mt-1">
                                    <span id="stat-solved">0</span> / <span id="stat-total">0</span> Solved
                                </h2>
                                <div class="w-full bg-slate-100 dark:bg-slate-800 h-2 rounded-full mt-2.5 overflow-hidden">
                                    <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-indigo-500 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
                                </div>
                            </div>

                            <div class="flex flex-col gap-1 p-4 bg-slate-50/50 dark:bg-slate-800/20 rounded-2xl border border-slate-100 dark:border-slate-800/40">
                                <span class="text-[10px] font-bold text-slate-400 uppercase">Easy Completed</span>
                                <span class="text-lg font-extrabold text-emerald-600 dark:text-emerald-400"><span id="stat-easy">0</span> Solved</span>
                            </div>

                            <div class="flex flex-col gap-1 p-4 bg-slate-50/50 dark:bg-slate-800/20 rounded-2xl border border-slate-100 dark:border-slate-800/40">
                                <span class="text-[10px] font-bold text-slate-400 uppercase">Medium Completed</span>
                                <span class="text-lg font-extrabold text-amber-600 dark:text-amber-400"><span id="stat-medium">0</span> Solved</span>
                            </div>

                            <div class="flex flex-col gap-1 p-4 bg-slate-50/50 dark:bg-slate-800/20 rounded-2xl border border-slate-100 dark:border-slate-800/40">
                                <span class="text-[10px] font-bold text-slate-400 uppercase">Hard Completed</span>
                                <span class="text-lg font-extrabold text-rose-600 dark:text-rose-400"><span id="stat-hard">0</span> Solved</span>
                            </div>
                        </div>
                    </div>

                    <!-- Filters -->
                    <div class="bg-white dark:bg-slate-900 p-4 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div class="flex-1 relative">
                            <i data-lucide="search" class="w-4 h-4 absolute left-3 top-3 text-slate-400"></i>
                            <input type="text" id="searchInput" placeholder="Search by problem title..." class="w-full pl-9 pr-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-sm focus:outline-none focus:border-blue-500 text-slate-900 dark:text-white transition-colors" onchange="fetchProblems()" onkeyup="if(event.key==='Enter')fetchProblems()">
                        </div>
                        <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                            <select id="difficultySelect" class="bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-white text-sm rounded-xl px-4 py-2.5 focus:outline-none focus:border-blue-500 w-40" onchange="fetchProblems()">
                                <option value="">All Difficulties</option>
                                <option value="easy">Easy</option>
                                <option value="medium">Medium</option>
                                <option value="hard">Hard</option>
                            </select>
                        </div>
                    </div>

                    <div id="loader" class="flex justify-center py-12">
                        <div class="animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full"></div>
                    </div>

                    <!-- Problems Table -->
                    <div id="problemsContainer" class="bg-white dark:bg-slate-900 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm overflow-hidden hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm text-left">
                                <thead class="bg-slate-50 dark:bg-slate-800/50 text-slate-500 dark:text-slate-400 text-xs uppercase font-bold">
                                    <tr>
                                        <th class="px-6 py-4 rounded-tl-3xl">Status</th>
                                        <th class="px-6 py-4">Title</th>
                                        <th class="px-6 py-4">Difficulty</th>
                                        <th class="px-6 py-4 text-right rounded-tr-3xl">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="problemsTbody" class="divide-y divide-slate-100 dark:divide-slate-800/80">
                                    <!-- JS Inject -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const token = api.getToken();
            if(!token) { window.location.href='login.html'; return; }
            fetchProblems();
        });

        async function fetchProblems() {
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('problemsContainer').classList.add('hidden');

            const search = document.getElementById('searchInput').value.trim();
            const difficulty = document.getElementById('difficultySelect').value;

            try {
                let url = '/coding?';
                if(difficulty) url += `difficulty=${difficulty}&`;
                
                const res = await api.request(url);
                let list = res.data.problems || [];
                
                if(search) {
                    list = list.filter(p => p.title.toLowerCase().includes(search.toLowerCase()));
                }

                // Stats calculation
                const allRes = await api.request('/coding?limit=100');
                const allProbs = allRes.data.problems || [];
                const solved = allProbs.filter(p => p.isSolved).length;
                const total = allProbs.length;
                const easy = allProbs.filter(p => p.difficulty === 'easy' && p.isSolved).length;
                const medium = allProbs.filter(p => p.difficulty === 'medium' && p.isSolved).length;
                const hard = allProbs.filter(p => p.difficulty === 'hard' && p.isSolved).length;

                document.getElementById('stat-solved').textContent = solved;
                document.getElementById('stat-total').textContent = total;
                document.getElementById('progress-bar').style.width = total > 0 ? \`\${(solved/total)*100}%\` : '0%';
                document.getElementById('stat-easy').textContent = easy;
                document.getElementById('stat-medium').textContent = medium;
                document.getElementById('stat-hard').textContent = hard;

                renderProblems(list);
                document.getElementById('problemsContainer').classList.remove('hidden');

            } catch(e) {
                console.error(e);
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }

        function getDiffBadge(diff) {
            switch(diff) {
                case 'easy': return '<span class="px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider bg-emerald-100 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-400">Easy</span>';
                case 'medium': return '<span class="px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider bg-amber-100 text-amber-700 dark:bg-amber-500/10 dark:text-amber-400">Medium</span>';
                case 'hard': return '<span class="px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider bg-rose-100 text-rose-700 dark:bg-rose-500/10 dark:text-rose-400">Hard</span>';
                default: return '<span class="px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider bg-slate-100 text-slate-700 dark:bg-slate-500/10 dark:text-slate-400">Unknown</span>';
            }
        }

        function renderProblems(probs) {
            const tbody = document.getElementById('problemsTbody');
            if(probs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-slate-500">No coding problems found.</td></tr>`;
                return;
            }

            tbody.innerHTML = probs.map(p => {
                const statusIcon = p.isSolved 
                    ? '<i data-lucide="check-circle" class="w-5 h-5 text-emerald-500"></i>' 
                    : '<i data-lucide="circle" class="w-5 h-5 text-slate-300 dark:text-slate-600"></i>';
                
                return `
                <tr class="hover:bg-slate-50/50 dark:hover:bg-slate-800/30 transition-colors group">
                    <td class="px-6 py-4">
                        ${statusIcon}
                    </td>
                    <td class="px-6 py-4 font-bold text-slate-800 dark:text-white">
                        ${p.title}
                    </td>
                    <td class="px-6 py-4">
                        ${getDiffBadge(p.difficulty)}
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="window.location.href='coding-editor.html?id=${p._id}'" class="inline-flex items-center gap-1.5 px-4 py-2 rounded-xl bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold text-xs transition-colors">
                            Solve <i data-lucide="chevron-right" class="w-4 h-4"></i>
                        </button>
                    </td>
                </tr>
                `;
            }).join('');
            lucide.createIcons();
        }
    </script>
</body>
</html>
