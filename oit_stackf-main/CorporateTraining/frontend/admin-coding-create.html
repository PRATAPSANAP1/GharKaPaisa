<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIT_STACK - Add Coding Problem</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- API Config -->
    <script src="api.js"></script>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 font-sans transition-colors duration-300 pb-12">

    <!-- Topbar -->
    <nav class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200/80 dark:border-slate-800/60 flex items-center justify-between px-6 sticky top-0 z-30">
        <div class="flex items-center gap-3">
            <img src="../image/logo.jpg" alt="OIT_STACK" class="w-8 h-8 object-cover rounded-lg shadow-sm" />
            <span class="font-bold text-slate-900 dark:text-white text-sm">OIT_STACK ADMIN</span>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
            </button>
        </div>
    </nav>

    <div id="loader" class="flex justify-center items-center h-64">
        <div class="animate-spin h-8 w-8 border-4 border-indigo-500 border-t-transparent rounded-full"></div>
    </div>

    <div id="content" class="hidden flex-col gap-6 p-6 max-w-4xl mx-auto w-full">
        
        <div>
            <a href="admin-coding.html" class="inline-flex items-center text-sm text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white transition-colors font-bold mb-4">
                <i data-lucide="chevron-left" class="w-4 h-4 mr-1.5"></i> Back to Coding Problems
            </a>
            <h1 id="pageTitle" class="text-2xl font-black text-slate-900 dark:text-white">Add Coding Challenge</h1>
        </div>

        <form id="problemForm" onsubmit="saveProblem(event)" class="flex flex-col gap-6">

            <!-- Basic Panel -->
            <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 shadow-sm p-6 flex flex-col gap-5">
                <h3 class="font-bold text-slate-800 dark:text-white pb-2 border-b border-slate-50 dark:border-slate-800">Problem Metadata</h3>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
                    <div class="sm:col-span-2 flex flex-col gap-1.5">
                        <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Problem Title</label>
                        <input type="text" id="pTitle" required placeholder="e.g. Find First Duplicate Index" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Difficulty Level</label>
                        <select id="pDifficulty" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                            <option value="easy">Easy</option>
                            <option value="medium" selected>Medium</option>
                            <option value="hard">Hard</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Parent Category</label>
                        <select id="pCategory" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                            <option value="">Select Category</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Reward Points</label>
                        <input type="number" id="pPoints" required value="100" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                    </div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Problem Description</label>
                    <textarea id="pDesc" rows="5" required placeholder="Provide a detailed outline of the task, constraints, input criteria..." class="w-full py-2.5 px-4 rounded-xl text-sm transition-all duration-300 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 focus:border-indigo-500 focus:outline-none"></textarea>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">CPU Time (Secs)</label>
                        <input type="number" step="0.5" id="pTime" required value="2" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Memory (MB)</label>
                        <input type="number" id="pMem" required value="256" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                    </div>
                    <div class="flex items-center justify-between border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2 mt-4 sm:mt-0 select-none bg-slate-50 dark:bg-slate-800">
                        <label class="text-xs font-bold text-slate-700 dark:text-slate-300">Set Active</label>
                        <input type="checkbox" id="pActive" checked class="w-5 h-5 rounded-lg border-slate-300">
                    </div>
                </div>
            </div>

            <!-- Formats and constraints -->
            <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 shadow-sm p-6 flex flex-col gap-5">
                <h3 class="font-bold text-slate-800 dark:text-white pb-2 border-b border-slate-50 dark:border-slate-800">Formatting & Constraints</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Input format description</label>
                        <textarea id="pInputFormat" rows="2" placeholder="e.g. First line contains integer N, followed by N integers..." class="w-full py-2.5 px-4 rounded-xl text-sm transition-all duration-300 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 focus:border-indigo-500 focus:outline-none"></textarea>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Output format description</label>
                        <textarea id="pOutputFormat" rows="2" placeholder="e.g. Return the duplicate element value, or -1 if no duplicates exist." class="w-full py-2.5 px-4 rounded-xl text-sm transition-all duration-300 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 focus:border-indigo-500 focus:outline-none"></textarea>
                    </div>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Constraints</label>
                    <textarea id="pConstraints" rows="2" placeholder="e.g. 1 <= N <= 10^5" class="w-full py-2.5 px-4 rounded-xl text-sm transition-all duration-300 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 focus:border-indigo-500 focus:outline-none"></textarea>
                </div>
            </div>

            <!-- Example cases panel -->
            <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 shadow-sm p-6 flex flex-col gap-4">
                <div class="flex justify-between items-center pb-2 border-b border-slate-50 dark:border-slate-800">
                    <h3 class="font-bold text-slate-800 dark:text-white">Example Cases (<span id="exCount">1</span>)</h3>
                    <button type="button" onclick="addExample()" class="text-xs font-bold text-indigo-500 hover:text-indigo-600 inline-flex items-center gap-1">
                        <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add Case
                    </button>
                </div>
                <div id="examplesContainer" class="flex flex-col gap-4"></div>
            </div>

            <!-- Compiler test cases -->
            <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 shadow-sm p-6 flex flex-col gap-4">
                <div class="flex justify-between items-center pb-2 border-b border-slate-50 dark:border-slate-800">
                    <h3 class="font-bold text-slate-800 dark:text-white">Compiler Test Cases (<span id="tcCount">1</span>)</h3>
                    <button type="button" onclick="addTestCase()" class="text-xs font-bold text-indigo-500 hover:text-indigo-600 inline-flex items-center gap-1">
                        <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add Testcase
                    </button>
                </div>
                <div id="testCasesContainer" class="flex flex-col gap-4"></div>
            </div>

            <div class="flex gap-4">
                <button type="submit" id="btnSave" class="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl flex items-center gap-2 transition-colors shadow-lg shadow-indigo-500/20">
                    <i data-lucide="save" class="w-4 h-4"></i> <span id="btnSaveText">Save Problem</span>
                </button>
                <a href="admin-coding.html" class="px-8 py-3 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-800 dark:text-white font-bold rounded-xl flex items-center transition-colors">
                    Cancel
                </a>
            </div>

        </form>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="hidden fixed top-4 right-4 z-50 p-4 rounded-xl text-sm font-semibold shadow-lg border"></div>

    <script>
        lucide.createIcons();

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `fixed top-4 right-4 z-50 p-4 rounded-xl text-sm font-semibold shadow-lg border transition-opacity ${
                type === 'success' 
                ? 'bg-white dark:bg-slate-900 text-slate-900 dark:text-white border-slate-200 dark:border-slate-800' 
                : 'bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 border-red-200 dark:border-red-800'
            }`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 5000);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const problemId = urlParams.get('id');
        const isEdit = !!problemId;

        let examples = [{ id: Date.now(), input: '', output: '', explanation: '' }];
        let testCases = [{ id: Date.now() + 1, input: '', expectedOutput: '', isHidden: false }];

        document.addEventListener('DOMContentLoaded', async () => {
            if (!api.getToken()) { window.location.href = 'login.html'; return; }
            
            try {
                const catRes = await api.request('/admin/categories?type=coding');
                const catSelect = document.getElementById('pCategory');
                catRes.data.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c._id;
                    opt.textContent = c.name;
                    catSelect.appendChild(opt);
                });
            } catch(e) { console.error('Error fetching categories'); }

            if (isEdit) {
                document.getElementById('pageTitle').textContent = 'Modify Coding Challenge';
                await loadProblem();
            } else {
                renderExamples();
                renderTestCases();
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                document.getElementById('content').classList.add('flex');
            }
        });

        async function loadProblem() {
            try {
                const res = await api.request(`/admin/coding/${problemId}`);
                const p = res.data;

                document.getElementById('pTitle').value = p.title;
                document.getElementById('pDifficulty').value = p.difficulty || 'medium';
                if(p.category) document.getElementById('pCategory').value = p.category._id || p.category;
                document.getElementById('pPoints').value = p.points || 100;
                document.getElementById('pDesc').value = p.description;
                document.getElementById('pTime').value = p.timeLimit || 2;
                document.getElementById('pMem').value = p.memoryLimit || 256;
                document.getElementById('pActive').checked = p.isActive !== false;
                document.getElementById('pInputFormat').value = p.inputFormat || '';
                document.getElementById('pOutputFormat').value = p.outputFormat || '';
                document.getElementById('pConstraints').value = p.constraints || '';

                if (p.examples && p.examples.length > 0) {
                    examples = p.examples.map((ex, i) => ({ id: Date.now() + i, input: ex.input, output: ex.output, explanation: ex.explanation || '' }));
                }
                if (p.testCases && p.testCases.length > 0) {
                    testCases = p.testCases.map((tc, i) => ({ id: Date.now() + i + 100, input: tc.input, expectedOutput: tc.expectedOutput, isHidden: tc.isHidden }));
                }

                renderExamples();
                renderTestCases();

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                document.getElementById('content').classList.add('flex');
            } catch(e) {
                showToast('Failed to load problem details', 'error');
                setTimeout(() => window.location.href = 'admin-coding.html', 1500);
            }
        }

        function addExample() {
            examples.push({ id: Date.now(), input: '', output: '', explanation: '' });
            renderExamples();
        }

        function removeExample(id) {
            if (examples.length <= 1) { showToast('Must have at least 1 example.', 'error'); return; }
            examples = examples.filter(ex => ex.id !== id);
            renderExamples();
        }

        function updateExample(id, field, value) {
            const ex = examples.find(e => e.id === id);
            if(ex) ex[field] = value;
        }

        function renderExamples() {
            document.getElementById('exCount').textContent = examples.length;
            const container = document.getElementById('examplesContainer');
            container.innerHTML = examples.map((ex, idx) => `
                <div class="p-4 bg-slate-50/50 dark:bg-slate-800/25 rounded-2xl border border-slate-100 dark:border-slate-800/40 space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-sm uppercase font-bold text-slate-400">Example ${idx + 1}</span>
                        ${examples.length > 1 ? `<button type="button" onclick="removeExample(${ex.id})" class="p-1 text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-500/10 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="flex flex-col gap-1.5">
                            <label class="text-sm font-bold text-slate-400 uppercase">Input</label>
                            <textarea rows="2" oninput="updateExample(${ex.id}, 'input', this.value)" class="w-full py-2 px-3 rounded-xl text-xs bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:border-indigo-500 focus:outline-none transition-all">${ex.input}</textarea>
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <label class="text-sm font-bold text-slate-400 uppercase">Output</label>
                            <textarea rows="2" oninput="updateExample(${ex.id}, 'output', this.value)" class="w-full py-2 px-3 rounded-xl text-xs bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:border-indigo-500 focus:outline-none transition-all">${ex.output}</textarea>
                        </div>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Explanation</label>
                        <input type="text" oninput="updateExample(${ex.id}, 'explanation', this.value)" value="${ex.explanation}" placeholder="Describe why this input gives this output..." class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function addTestCase() {
            testCases.push({ id: Date.now(), input: '', expectedOutput: '', isHidden: false });
            renderTestCases();
        }

        function removeTestCase(id) {
            if (testCases.length <= 1) { showToast('Must have at least 1 test case.', 'error'); return; }
            testCases = testCases.filter(tc => tc.id !== id);
            renderTestCases();
        }

        function updateTestCase(id, field, value) {
            const tc = testCases.find(t => t.id === id);
            if(tc) tc[field] = value;
        }

        function renderTestCases() {
            document.getElementById('tcCount').textContent = testCases.length;
            const container = document.getElementById('testCasesContainer');
            container.innerHTML = testCases.map((tc, idx) => `
                <div class="p-4 bg-slate-50/50 dark:bg-slate-800/25 rounded-2xl border border-slate-100 dark:border-slate-800/40 space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-sm uppercase font-bold text-slate-400">Test Case ${idx + 1}</span>
                        <div class="flex items-center gap-3">
                            <div class="flex items-center gap-1.5">
                                <input type="checkbox" onchange="updateTestCase(${tc.id}, 'isHidden', this.checked)" ${tc.isHidden ? 'checked' : ''} id="hide-${tc.id}" class="w-4 h-4 rounded text-indigo-600 border-slate-300">
                                <label for="hide-${tc.id}" class="text-sm font-bold text-slate-500 select-none cursor-pointer">Hidden Case</label>
                            </div>
                            ${testCases.length > 1 ? `<button type="button" onclick="removeTestCase(${tc.id})" class="p-1 text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-500/10 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="flex flex-col gap-1.5">
                            <label class="text-sm font-bold text-slate-400 uppercase">Input stdin</label>
                            <textarea rows="2" oninput="updateTestCase(${tc.id}, 'input', this.value)" class="w-full py-2 px-3 rounded-xl text-xs bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:border-indigo-500 focus:outline-none transition-all">${tc.input}</textarea>
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <label class="text-sm font-bold text-slate-400 uppercase">Expected stdout</label>
                            <textarea rows="2" oninput="updateTestCase(${tc.id}, 'expectedOutput', this.value)" class="w-full py-2 px-3 rounded-xl text-xs bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:border-indigo-500 focus:outline-none transition-all">${tc.expectedOutput}</textarea>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function saveProblem(e) {
            e.preventDefault();

            const validExamples = examples.filter(ex => ex.input.trim() || ex.output.trim()).map(ex => ({
                input: ex.input.trim(),
                output: ex.output.trim(),
                explanation: ex.explanation.trim()
            }));

            const validTestCases = testCases.filter(tc => tc.input.trim() || tc.expectedOutput.trim()).map(tc => ({
                input: tc.input.trim(),
                expectedOutput: tc.expectedOutput.trim(),
                isHidden: tc.isHidden
            }));

            if(validTestCases.length === 0) { showToast('Please configure at least one test case.', 'error'); return; }

            const btn = document.getElementById('btnSave');
            btn.disabled = true;
            btn.innerHTML = `<div class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></div> <span>Saving...</span>`;

            const payload = {
                title: document.getElementById('pTitle').value.trim(),
                description: document.getElementById('pDesc').value.trim(),
                difficulty: document.getElementById('pDifficulty').value,
                category: document.getElementById('pCategory').value || null,
                constraints: document.getElementById('pConstraints').value.trim(),
                inputFormat: document.getElementById('pInputFormat').value.trim(),
                outputFormat: document.getElementById('pOutputFormat').value.trim(),
                examples: validExamples,
                testCases: validTestCases,
                timeLimit: parseFloat(document.getElementById('pTime').value),
                memoryLimit: parseInt(document.getElementById('pMem').value),
                points: parseInt(document.getElementById('pPoints').value),
                isActive: document.getElementById('pActive').checked,
            };

            try {
                if (isEdit) {
                    await api.request(`/admin/coding/${problemId}`, { method: 'PUT', body: JSON.stringify(payload) });
                    showToast('Coding problem saved successfully!');
                } else {
                    await api.request('/admin/coding', { method: 'POST', body: JSON.stringify(payload) });
                    showToast('Coding problem created successfully!');
                }
                setTimeout(() => window.location.href = 'admin-coding.html', 1000);
            } catch(err) {
                showToast(err.message || 'Failed to save coding problem.', 'error');
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="save" class="w-4 h-4"></i> <span>Save Problem</span>`;
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
